                              "text": "Their functions include absorbing ultraviolet light and converting it into harmless energy, quenching excited states, removing free radicals, and terminating photo-oxidation chain reactions. Light stabilizers are widely used in plastics, rubber, coatings, and synthetic fibers. By mechanism, common types include ultraviolet absorbers and hindered amine light stabilizers, or HALS."
                        },
                        {
                              "start": 57264,
                              "end": 87984,
                              "text": "UV absorbers absorb ultraviolet light, while HALS capture radicals and have a certain regenerative ability. An ideal light stabilizer should be efficient, heat resistant, migration resistant, compatible with the polymer, low in volatility and toxicity, and should not greatly affect color or performance. Modern research is moving toward high efficiency, low toxicity, synergistic compounding, and long-lasting environmental protection."
                        }
                  ]
            },
            "duration": {
                  "zh": 64.174,
                  "en": 87.984
            },
            "alt": "第22张：5.1 光稳定剂概述"
      },
      {
            "id": "slide023",
            "index": 23,
            "number": "5.2",
            "title": "5.2 紫外线对聚合物的老化作用",
            "titleEn": "5.2 Aging Effects of Ultraviolet Light on Polymers",
            "image": "player_assets/slide023.webp",
            "audio": {
                  "zh": "player_assets/slide023_zh.mp3",
                  "en": "player_assets/slide023_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide023_zh.vtt",
                  "en": "player_assets/slide023_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 28536,
                              "text": "太阳光中的紫外线波长约为100至400纳米，能量较高，可以被聚合物吸收并引发光化学反应。 紫外光能使碳碳键、碳氧键等化学键断裂，形成自由基或激发态分子，这是光老化的起点。 自由基随后与氧反应生成过氧自由基，再经过夺氢、形成氢过氧化物和分解等步骤不断产生新自由基，形成链式反应。"
                        },
                        {
                              "start": 28536,
                              "end": 54744,
                              "text": "分子链会发生断链或交联：断链使分子量下降、材料变脆和强度降低； 交联可能使材料变硬并容易开裂。 最终表现为力学性能下降、变色失光、粉化、脆裂和使用寿命缩短。 老化速度还受紫外线强度、照射时间、温度、氧气、水分、污染物和聚合物结构影响。"
                        },
                        {
                              "start": 54744,
                              "end": 61992,
                              "text": "农用薄膜、户外涂层、轮胎和塑料制品长期暴露在户外，必须采取光稳定措施。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 26592,
                              "text": "Ultraviolet light in sunlight has wavelengths of about 100 to 400 nanometers and relatively high energy. It can be absorbed by polymers and trigger photochemical reactions. Ultraviolet light can break chemical bonds such as carbon-carbon and carbon-oxygen bonds, forming free radicals or excited molecules. This is the starting point of photo-aging. Free radicals then react with oxygen to produce peroxy radicals."
                        },
                        {
                              "start": 26592,
                              "end": 51168,
                              "text": "Through hydrogen abstraction, hydroperoxide formation, and decomposition, new radicals are continuously generated and a chain reaction develops. Molecular chains may undergo scission or crosslinking. Chain scission reduces molecular weight, makes materials brittle, and lowers strength. Crosslinking may make materials harder and more prone to cracking."
                        },
                        {
                              "start": 51168,
                              "end": 79368,
                              "text": "The final results are reduced mechanical properties, discoloration, gloss loss, powdering, cracking, and shorter service life. Aging rate is also affected by UV intensity, exposure time, temperature, oxygen, moisture, pollutants, and polymer structure. Agricultural film, outdoor coatings, tires, and plastic products exposed outdoors for long periods must therefore use light-stabilizing measures."
                        }
                  ]
            },
            "duration": {
                  "zh": 61.992,
                  "en": 79.368
            },
            "alt": "第23张：5.2 紫外线对聚合物的老化作用"
      },
      {
            "id": "slide024",
            "index": 24,
            "number": "5.3",
            "title": "5.3 光氧化降解机理",
            "titleEn": "5.3 Mechanism of Photo-Oxidative Degradation",
            "image": "player_assets/slide024.webp",
            "audio": {
                  "zh": "player_assets/slide024_zh.mp3",
                  "en": "player_assets/slide024_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide024_zh.vtt",
                  "en": "player_assets/slide024_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 31008,
                              "text": "聚合物吸收光子后会进入激发态。 大部分激发能可通过发光、放热或能量转移无害释放，但也可能引起化学键断裂，从而启动光氧化降解。 能态变化包括从基态跃迁到激发单线态或三线态，再通过荧光、磷光和无辐射过程回到低能态。 光氧化可由臭氧、氧、聚合物自身的发色基团以及催化剂残留物引发。"
                        },
                        {
                              "start": 31008,
                              "end": 56736,
                              "text": "臭氧在紫外线作用下生成活性氧； 聚合过程残留的TiO2、Al2O3等无机物也可能吸收紫外线。 氢过氧化物受光分解产生烷氧自由基和羟基自由基，继续夺氢、加氧或发生β断裂。 羰基还可发生诺里什I型或II型断裂，生成自由基并引起链断裂。"
                        },
                        {
                              "start": 56736,
                              "end": 70943,
                              "text": "整体过程可以概括为：发色基团吸光，激发态断裂，分子氧生成单线态氧，随后形成过氧化物并继续氧化，最终导致发黄、变脆和开裂。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 29544,
                              "text": "After absorbing photons, a polymer enters an excited state. Most excited energy can be harmlessly released through light emission, heat release, or energy transfer. However, it may also break chemical bonds and start photo-oxidative degradation. Energy-state changes include transition from the ground state to excited singlet or triplet states, followed by fluorescence, phosphorescence, or non-radiative return to a lower energy state."
                        },
                        {
                              "start": 29544,
                              "end": 59232,
                              "text": "Photo-oxidation may be initiated by ozone, oxygen, chromophoric groups in the polymer, or catalyst residues. Ozone produces active oxygen under ultraviolet light. Residual inorganic substances such as TiO2 or Al2O3 from polymerization may also absorb ultraviolet light. Hydroperoxides decompose under light to form alkoxy and hydroxyl radicals, which continue hydrogen abstraction, oxygen addition, or beta scission."
                        },
                        {
                              "start": 59232,
                              "end": 83256,
                              "text": "Carbonyl groups can also undergo Norrish type I or type II cleavage, producing radicals and causing chain scission. Overall, the process can be summarized as chromophores absorbing light, excited-state cleavage, formation of singlet oxygen, peroxide formation, continuing oxidation, and finally yellowing, embrittlement, and cracking."
                        }
                  ]
            },
            "duration": {
                  "zh": 70.943,
                  "en": 83.256
            },
            "alt": "第24张：5.3 光氧化降解机理"
      },
      {
            "id": "slide025",
            "index": 25,
            "number": "5.4",
            "title": "5.4 光稳定剂作用机理",
            "titleEn": "5.4 Mechanisms of Light Stabilizers",
            "image": "player_assets/slide025.webp",
            "audio": {
                  "zh": "player_assets/slide025_zh.mp3",
                  "en": "player_assets/slide025_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide025_zh.vtt",
                  "en": "player_assets/slide025_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 22823,
                              "text": "高分子材料在光、氧、热和水分共同作用下会光老化。 光稳定剂的保护不是单一路径，而是由光屏蔽剂、紫外线吸收剂、淬灭剂和自由基捕获剂共同构成。 光屏蔽剂利用反射、散射或阻挡紫外线减少其进入材料内部，常见的有无机颜料和炭黑。"
                        },
                        {
                              "start": 22823,
                              "end": 49943,
                              "text": "紫外线吸收剂选择性吸收高能紫外线，再以无害热能释放，常见结构包括二苯甲酮和苯并三唑。 淬灭剂不直接强吸收紫外线，而是接收激发态分子的能量，使其安全回到基态。 受阻胺光稳定剂HALS几乎不吸收紫外线，却能捕捉自由基、淬灭单线态氧并分解过氧化物。"
                        },
                        {
                              "start": 49943,
                              "end": 66718,
                              "text": "它还能形成较稳定的氮氧自由基并继续循环捕获新自由基，因此具有持久保护能力。 多种稳定剂协同使用，可在光进入、能量激发和自由基反应多个环节共同拦截光老化。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 28248,
                              "text": "Polymer materials undergo photo-aging under the combined action of light, oxygen, heat, and moisture. Protection by light stabilizers is not a single pathway. It is built from light screeners, ultraviolet absorbers, quenchers, and radical scavengers working together. Light screeners reduce ultraviolet penetration into the material by reflection, scattering, or blocking. Common examples include inorganic pigments and carbon black."
                        },
                        {
                              "start": 28248,
                              "end": 47999,
                              "text": "Ultraviolet absorbers selectively absorb high-energy UV light and release it as harmless heat. Common structures include benzophenones and benzotriazoles. Quenchers do not strongly absorb UV directly. Instead, they accept energy from excited molecules and help them return safely to the ground state."
                        },
                        {
                              "start": 47999,
                              "end": 76391,
                              "text": "Hindered amine light stabilizers, or HALS, almost do not absorb ultraviolet light, but they can capture radicals, quench singlet oxygen, and decompose peroxides. They form relatively stable nitroxyl radicals and continue to capture new radicals in a cycle, so they provide durable protection. Combining several stabilizers can intercept photo-aging at light entry, energy excitation, and radical reaction stages."
                        }
                  ]
            },
            "duration": {
                  "zh": 66.718,
                  "en": 76.391
            },
            "alt": "第25张：5.4 光稳定剂作用机理"
      },
      {
            "id": "slide026",
            "index": 26,
            "number": "5.5",
            "title": "5.5 光稳定剂各论",
            "titleEn": "5.5 Main Types of Light Stabilizers",
            "image": "player_assets/slide026.webp",
            "audio": {
                  "zh": "player_assets/slide026_zh.mp3",
                  "en": "player_assets/slide026_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide026_zh.vtt",
                  "en": "player_assets/slide026_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 20999,
                              "text": "光稳定剂主要包括紫外线吸收剂UVA、受阻胺光稳定剂HALS、光屏蔽剂和复配体系。 UVA通过吸收200至400纳米的紫外线并转化为热能保护聚合物，代表品种有苯并三唑、二苯甲酮、水杨酸酯和三嗪类。"
                        },
                        {
                              "start": 20999,
                              "end": 45623,
                              "text": "HALS含受阻胺基团，分子量较大、挥发性低，能够捕获自由基、中和过氧化物分解产物并终止氧化链。 光屏蔽剂主要以物理方式反射或散射紫外线，包括二氧化钛、氧化锌、炭黑和某些颜料。 复配体系把UVA、HALS和光屏蔽剂组合，利用协同作用获得更长效保护。"
                        },
                        {
                              "start": 45623,
                              "end": 67126,
                              "text": "选择时要考虑聚合物类型、紫外线强度、温湿度、透明度和颜色要求、加工耐热性以及法规。 农膜、汽车内外饰和户外建材往往采用不同的复配方案。 未来重点是高效、低迁移、环保、多功能和智能响应。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 26424,
                              "text": "Light stabilizers mainly include ultraviolet absorbers, hindered amine light stabilizers, light screeners, and compound systems. UV absorbers protect polymers by absorbing ultraviolet light from 200 to 400 nanometers and converting it into heat. Representative types include benzotriazoles, benzophenones, salicylates, and triazines. HALS contain hindered amine groups."
                        },
                        {
                              "start": 26424,
                              "end": 50424,
                              "text": "They often have relatively high molecular weight and low volatility, and they can capture radicals, neutralize peroxide decomposition products, and terminate oxidation chains. Light screeners protect mainly by physical reflection or scattering of ultraviolet light. Examples include titanium dioxide, zinc oxide, carbon black, and some pigments."
                        },
                        {
                              "start": 50424,
                              "end": 78096,
                              "text": "Compound systems combine UV absorbers, HALS, and light screeners to achieve longer lasting protection through synergy. Selection should consider polymer type, UV intensity, temperature and humidity, transparency and color requirements, processing heat resistance, and regulations. Agricultural films, automotive interior and exterior parts, and outdoor building materials often require different compound solutions."
                        },
                        {
                              "start": 78096,
                              "end": 87455,
                              "text": "Future development focuses on high efficiency, low migration, environmental friendliness, multifunctionality, and smart response."
                        }
                  ]
            },
            "duration": {
                  "zh": 67.126,
                  "en": 87.455
            },
            "alt": "第26张：5.5 光稳定剂各论"
      },
      {
            "id": "slide027",
            "index": 27,
            "number": "5.6",
            "title": "5.6 光稳定剂的选择及应用",
            "titleEn": "5.6 Selection and Application of Light Stabilizers",
            "image": "player_assets/slide027.webp",
            "audio": {
                  "zh": "player_assets/slide027_zh.mp3",
                  "en": "player_assets/slide027_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide027_zh.vtt",
                  "en": "player_assets/slide027_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 28488,
                              "text": "选择光稳定剂首先要看它能否在材料最敏感的波长范围内有效吸收或消耗光能，并与聚合物相容，避免起霜和迁移。 还要具备良好的热稳定性、耐萃取和耐水解性，不污染透明或浅色制品，且低毒安全。 实际配方还要考虑抗氧剂、热稳定剂、润滑剂和颜料之间的相互作用。 不同树脂需要不同方案。"
                        },
                        {
                              "start": 28488,
                              "end": 54288,
                              "text": "PVC户外制品常用二苯甲酮、苯并三唑或取代丙烯腈类，同时关注与热稳定剂的配合； PE农膜常把受阻胺与抗氧剂并用； PP电缆和喷灌管需同时提高抗光和抗氧能力； PS容易光氧化发黄，可选择吸收其敏感波段的稳定剂，并与橡胶或受阻酚协同。"
                        },
                        {
                              "start": 54288,
                              "end": 66431,
                              "text": "因此，选型逻辑应依次考虑聚合物、敏感波长、加工条件、使用环境、助剂配合、颜色透明度和安全要求，通过试验确定最佳体系。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 25800,
                              "text": "When selecting a light stabilizer, first consider whether it can effectively absorb or consume light energy in the wavelength range most sensitive to the material. It must also be compatible with the polymer to avoid blooming and migration. Good heat stability, extraction resistance, and hydrolysis resistance are needed. It should not contaminate transparent or light-colored products and should be safe and low-toxic."
                        },
                        {
                              "start": 25800,
                              "end": 53112,
                              "text": "Actual formulations must also consider interactions with antioxidants, heat stabilizers, lubricants, and pigments. Different resins need different solutions. Outdoor PVC products often use benzophenones, benzotriazoles, or substituted acrylonitrile types, while also considering compatibility with heat stabilizers. PE agricultural film often combines HALS with antioxidants."
                        },
                        {
                              "start": 53112,
                              "end": 81192,
                              "text": "PP cables and irrigation pipes need improvements in both light resistance and oxidation resistance. PS is prone to yellowing by photo-oxidation, so stabilizers should absorb sensitive wavelengths and work together with rubber or hindered phenols. Therefore, selection should consider polymer type, sensitive wavelength, processing conditions, service environment, additive combination, color and transparency, and safety requirements."
                        },
                        {
                              "start": 81192,
                              "end": 84480,
                              "text": "The best system must be confirmed by testing."
                        }
                  ]
            },
            "duration": {
                  "zh": 66.431,
                  "en": 84.48
            },
            "alt": "第27张：5.6 光稳定剂的选择及应用"
      },
      {
            "id": "slide028",
            "index": 28,
            "number": "5.7",
            "title": "5.7 光稳定剂市场现状及发展趋势",
            "titleEn": "5.7 Market Status and Trends of Light Stabilizers",
            "image": "player_assets/slide028.webp",
            "audio": {
                  "zh": "player_assets/slide028_zh.mp3",
                  "en": "player_assets/slide028_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide028_zh.vtt",
                  "en": "player_assets/slide028_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 22703,
                              "text": "随着塑料、涂料、橡胶和户外高分子制品快速发展，光稳定剂市场需求保持增长。 主要应用包括包装与农膜、户外建筑涂层、汽车涂料、轮胎密封件以及纤维、胶黏剂等新兴领域。 产品结构中，HALS应用广、占比较高，UVA是重要补充，复配产品增长较快。"
                        },
                        {
                              "start": 22703,
                              "end": 52775,
                              "text": "区域上，北美技术成熟并重视高端产品，欧洲环保法规严格，亚太地区增长最快，中国需求和产能持续提升。 市场竞争既有国际企业在高端领域的优势，也有国内企业凭借产能和性价比快速追赶，竞争重点逐渐转向技术、差异化产品和服务。 未来趋势一是高效化，用更少添加量获得更持久保护；"
                        },
                        {
                              "start": 52775,
                              "end": 66670,
                              "text": "二是环保绿色化，发展低毒、低挥发、可回收和生物基产品； 三是多功能、复配和定制化，将抗紫外、抗氧化和自由基捕获组合成面向具体场景的方案。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 26568,
                              "text": "With the rapid development of plastics, coatings, rubber, and outdoor polymer products, demand for light stabilizers continues to grow. Major applications include packaging and agricultural film, outdoor building coatings, automotive coatings, tire seals, fibers, adhesives, and other emerging fields. In product structure, HALS are widely used and hold a relatively high share."
                        },
                        {
                              "start": 26568,
                              "end": 47567,
                              "text": "UV absorbers are important supplements, and compound products are growing quickly. Regionally, North America has mature technology and focuses on high-end products. Europe has strict environmental regulations. The Asia-Pacific region is growing fastest, and China continues to expand both demand and production capacity."
                        },
                        {
                              "start": 47567,
                              "end": 75983,
                              "text": "Market competition includes advantages of international companies in high-end fields and rapid catch-up by domestic companies through capacity and cost performance. Competition is gradually shifting toward technology, differentiated products, and service. Future trends include higher efficiency, using less additive for longer protection; greener products with low toxicity, low volatility, recyclability, and bio-based sources;"
                        },
                        {
                              "start": 75983,
                              "end": 87310,
                              "text": "and multifunctional, compounded, and customized solutions that combine UV resistance, oxidation resistance, and radical trapping for specific application scenarios."
                        }
                  ]
            },
            "duration": {
                  "zh": 66.67,
                  "en": 87.31
            },
            "alt": "第28张：5.7 光稳定剂市场现状及发展趋势"
      },
      {
            "id": "slide029",
            "index": 29,
            "number": "6.1",
            "title": "6.1 阻燃剂概述",
            "titleEn": "6.1 Overview of Flame Retardants",
            "image": "player_assets/slide029.webp",
            "audio": {
                  "zh": "player_assets/slide029_zh.mp3",
                  "en": "player_assets/slide029_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide029_zh.vtt",
                  "en": "player_assets/slide029_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 29088,
                              "text": "塑料、橡胶等高分子材料应用广泛，但大多数具有可燃性。 燃烧不仅造成财产损失，还会威胁生命并产生有毒烟雾。 阻燃剂就是加入材料中，用于降低可燃性、延缓燃烧甚至使火焰熄灭的助剂，相当于给材料穿上一件“防火安全衣”。 阻燃剂通过物理或化学作用干扰燃烧。 冷却作用降低温度、吸收热量；"
                        },
                        {
                              "start": 29088,
                              "end": 53736,
                              "text": "隔绝作用减少氧气或空气进入； 抑制作用捕获燃烧自由基、减少可燃气体； 成炭作用形成致密炭层，阻隔热量和氧气。 多种机理协同，通常效果更好。 按使用方法可分为添加型和反应型。 其效果还受品种、添加量、与材料的相容性、加工工艺和使用环境影响。"
                        },
                        {
                              "start": 53736,
                              "end": 62039,
                              "text": "合理配方能争取疏散和灭火时间，广泛服务于建筑、交通、电子电器与家居领域。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 30672,
                              "text": "Polymer materials such as plastics and rubber are widely used, but most are combustible. Fire causes not only property loss, but also threats to life and toxic smoke. Flame retardants are additives added to materials to reduce combustibility, delay burning, or even extinguish flame. They are like a fire-safety coat for the material. Flame retardants interfere with combustion through physical or chemical action. Cooling lowers temperature and absorbs heat."
                        },
                        {
                              "start": 30672,
                              "end": 62208,
                              "text": "Isolation reduces the entry of oxygen or air. Inhibition captures combustion radicals and reduces flammable gases. Charring forms a dense carbon layer that blocks heat and oxygen. Several mechanisms often work together and give better results. By method of use, flame retardants are divided into additive type and reactive type. Their effect is also influenced by type, dosage, compatibility with the material, processing method, and service environment."
                        },
                        {
                              "start": 62208,
                              "end": 74351,
                              "text": "A reasonable formulation can buy time for evacuation and fire extinguishing, and is widely used in construction, transportation, electrical and electronic products, and household goods."
                        }
                  ]
            },
            "duration": {
                  "zh": 62.039,
                  "en": 74.351
            },
            "alt": "第29张：6.1 阻燃剂概述"
      },
      {
            "id": "slide030",
            "index": 30,
            "number": "6.2",
            "title": "6.2 聚合物燃烧与阻燃机理",
            "titleEn": "6.2 Polymer Combustion and Flame-Retardant Mechanisms",
            "image": "player_assets/slide030.webp",
            "audio": {
                  "zh": "player_assets/slide030_zh.mp3",
                  "en": "player_assets/slide030_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide030_zh.vtt",
                  "en": "player_assets/slide030_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 28728,
                              "text": "聚合物燃烧需要同时具备可燃物、氧气或空气以及点火源三个条件。 受热后，聚合物先分解并释放可燃气体； 气体逸出并与空气混合后发生气相燃烧； 火焰释放的热量又反馈给材料，使其继续分解，燃烧循环得以维持。 聚合物含碳、氢较多，热值高，受热容易产生大量可燃气体；"
                        },
                        {
                              "start": 28728,
                              "end": 55368,
                              "text": "不完全燃烧还会产生烟和有毒气体，热塑性材料可能熔融滴落，导致火势蔓延。 阻燃的实质，就是破坏这条燃烧链或其中某个条件。 气相阻燃剂捕获氢自由基、羟基自由基等活性粒子，终止自由基链反应。 凝聚相阻燃剂促进材料表面形成致密炭层，隔热、隔氧并阻止可燃气体逸出。"
                        },
                        {
                              "start": 55368,
                              "end": 66071,
                              "text": "许多体系同时发挥气相和凝聚相作用。 最终效果还取决于阻燃剂种类、用量、分散性、聚合物结构和燃烧条件。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 26616,
                              "text": "Polymer combustion requires three conditions at the same time: combustible material, oxygen or air, and an ignition source. When heated, the polymer first decomposes and releases combustible gases. These gases escape and mix with air, then burn in the gas phase. Heat released by the flame feeds back to the material and causes further decomposition, so the burning cycle continues."
                        },
                        {
                              "start": 26616,
                              "end": 49487,
                              "text": "Polymers contain much carbon and hydrogen, have high heat value, and easily release large amounts of flammable gases when heated. Incomplete combustion also produces smoke and toxic gases. Thermoplastics may melt and drip, spreading fire. Flame retardancy therefore means breaking this combustion chain or removing one of its necessary conditions."
                        },
                        {
                              "start": 49487,
                              "end": 72959,
                              "text": "Gas-phase flame retardants capture active species such as hydrogen radicals and hydroxyl radicals, terminating radical chain reactions. Condensed-phase flame retardants promote formation of a dense carbon layer on the material surface, insulating heat and oxygen and preventing combustible gases from escaping. Many systems act in both phases."
                        },
                        {
                              "start": 72959,
                              "end": 81262,
                              "text": "The final effect also depends on flame-retardant type, dosage, dispersion, polymer structure, and burning conditions."
                        }
                  ]
            },
            "duration": {
                  "zh": 66.071,
                  "en": 81.262
            },
            "alt": "第30张：6.2 聚合物燃烧与阻燃机理"
      },
      {
            "id": "slide031",
            "index": 31,
            "number": "6.3",
            "title": "6.3 阻燃剂各论",
            "titleEn": "6.3 Main Types of Flame Retardants",
            "image": "player_assets/slide031.webp",
            "audio": {
                  "zh": "player_assets/slide031_zh.mp3",
                  "en": "player_assets/slide031_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide031_zh.vtt",
                  "en": "player_assets/slide031_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 23856,
                              "text": "阻燃剂按组成和机理可分为多类。 无机阻燃剂如氢氧化铝、氢氧化镁，受热分解释放水、吸热降温，并稀释可燃气体，烟毒性较低，但添加量通常较大。 卤系阻燃剂在燃烧时释放含卤物种捕获自由基，效率高、用量小，但要关注腐蚀性气体和二次污染。"
                        },
                        {
                              "start": 23856,
                              "end": 54672,
                              "text": "磷系阻燃剂可生成磷酸或偏磷酸，促进脱水成炭，部分品种兼有气相作用。 氮系阻燃剂受热释放不可燃气体，常与磷系配合产生协同。 硅系阻燃剂形成致密二氧化硅保护层，兼具热稳定和抑烟作用。 金属氢氧化物还可作为卤系、磷系体系的协效剂。 复配使用能提高效率、减少添加量和烟雾，并改善综合性能。"
                        },
                        {
                              "start": 54672,
                              "end": 61200,
                              "text": "未来阻燃剂将向高效、低烟低毒、环保、多功能和复合协同发展。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 26832,
                              "text": "Flame retardants can be divided into several types by composition and mechanism. Inorganic flame retardants such as aluminum hydroxide and magnesium hydroxide release water when heated, absorb heat, lower temperature, and dilute combustible gases. They have low smoke toxicity, but usually require high loading. Halogenated flame retardants release halogen-containing species during burning and capture radicals."
                        },
                        {
                              "start": 26832,
                              "end": 52440,
                              "text": "They are efficient and used at low dosage, but corrosive gases and secondary pollution must be considered. Phosphorus flame retardants can generate phosphoric acid or metaphosphoric acid, promoting dehydration and charring, and some also have gas-phase effects. Nitrogen flame retardants release non-combustible gases when heated and often work synergistically with phosphorus systems."
                        },
                        {
                              "start": 52440,
                              "end": 83688,
                              "text": "Silicon flame retardants form dense silica protective layers and can improve heat stability and smoke suppression. Metal hydroxides can also act as synergists in halogen or phosphorus systems. Compounding can improve efficiency, reduce dosage and smoke, and improve overall performance. Future flame retardants will develop toward high efficiency, low smoke, low toxicity, environmental protection, multifunctionality, and compound synergy."
                        }
                  ]
            },
            "duration": {
                  "zh": 61.2,
                  "en": 83.688
            },
            "alt": "第31张：6.3 阻燃剂各论"
      },
      {
            "id": "slide032",
            "index": 32,
            "number": "6.4",
            "title": "6.4 阻燃剂在塑料中的应用",
            "titleEn": "6.4 Applications of Flame Retardants in Plastics",
            "image": "player_assets/slide032.webp",
            "audio": {
                  "zh": "player_assets/slide032_zh.mp3",
                  "en": "player_assets/slide032_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide032_zh.vtt",
                  "en": "player_assets/slide032_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 23736,
                              "text": "塑料燃烧时可能迅速蔓延，因此在电线电缆、电子外壳、建筑材料、交通内饰和家居用品中，阻燃性能直接关系到安全。 电器电子领域常见材料包括PVC、PE、PC、PA、ABS和PC/ABS，用于线缆、插座、开关、充电器和设备外壳。"
                        },
                        {
                              "start": 23736,
                              "end": 49416,
                              "text": "建筑中，PVC管材、型材和板材以及EPS、XPS保温材料都需满足相应阻燃要求。 汽车、轨道交通和船舶内饰需要降低火灾风险与烟毒； 洗衣机外壳、家具部件、玩具和灯具则需要在阻燃、外观、力学和使用安全之间取得平衡。 不同树脂的常用体系不同。"
                        },
                        {
                              "start": 49416,
                              "end": 70151,
                              "text": "PVC可采用有机锡、复合稳定剂和磷系阻燃剂； PP、PE常用磷氮体系并配合无卤协效剂； ABS、PC要兼顾阻燃与透明或力学性能； 工程塑料还重视耐热和长期稳定。 发展方向是无卤、低烟低毒、高效且应用更广。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 28752,
                              "text": "Plastic fires can spread rapidly, so flame retardancy is directly related to safety in wires and cables, electronic housings, building materials, transportation interiors, and household products. In electrical and electronic fields, common materials include PVC, PE, PC, PA, ABS, and PC/ABS, used in cables, sockets, switches, chargers, and equipment housings."
                        },
                        {
                              "start": 28752,
                              "end": 60576,
                              "text": "In construction, PVC pipes, profiles, sheets, and EPS or XPS insulation materials must meet corresponding flame-retardant requirements. Automotive, rail-transit, and ship interiors need to reduce fire risk and smoke toxicity. Washing-machine housings, furniture parts, toys, and lamps must balance flame retardancy, appearance, mechanical properties, and use safety. Different resins use different systems."
                        },
                        {
                              "start": 60576,
                              "end": 92088,
                              "text": "PVC may use organotin, composite stabilizers, and phosphorus flame retardants. PP and PE often use phosphorus-nitrogen systems with halogen-free synergists. ABS and PC must balance flame retardancy with transparency or mechanical properties. Engineering plastics also emphasize heat resistance and long-term stability. Development is moving toward halogen-free, low-smoke, low-toxic, efficient, and broadly applicable systems."
                        }
                  ]
            },
            "duration": {
                  "zh": 70.151,
                  "en": 92.088
            },
            "alt": "第32张：6.4 阻燃剂在塑料中的应用"
      },
      {
            "id": "slide033",
            "index": 33,
            "number": "6.5",
            "title": "6.5 阻燃剂发展现状与开发动向",
            "titleEn": "6.5 Development Status and Trends of Flame Retardants",
            "image": "player_assets/slide033.webp",
            "audio": {
                  "zh": "player_assets/slide033_zh.mp3",
                  "en": "player_assets/slide033_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide033_zh.vtt",
                  "en": "player_assets/slide033_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 28536,
                              "text": "阻燃剂正从传统卤系快速向无卤、高效和低毒体系转型，性能不断提高，应用从家电扩展到汽车、轨道交通和高端电子等领域。 总体趋势可以概括为高效化、环保化、功能化、协同化和专用化。 环保方向强调减少卤素、锑和铅等有害物，发展生物基、可降解、低烟和低腐蚀产品。"
                        },
                        {
                              "start": 28536,
                              "end": 59712,
                              "text": "高效与多功能方向要求更低添加量、更少烟雾和熔滴，并兼具抗静电、抗菌或耐老化等作用。 协同复配通过磷、氮、无机组分和协效剂组合，实现“1加1大于2”。 反应型和聚合物型阻燃剂把阻燃基团引入高分子主链，可减少迁移和挥发。 纳米黏土、石墨烯、纳米氧化镁等新材料可形成致密阻隔层。"
                        },
                        {
                              "start": 59712,
                              "end": 66312,
                              "text": "未来还要面向电子、轨道交通、新能源汽车和建筑等行业开发定制体系。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 27648,
                              "text": "Flame retardants are rapidly shifting from traditional halogenated systems toward halogen-free, efficient, and low-toxicity systems. Performance is improving, and applications have expanded from household appliances to automobiles, rail transit, and high-end electronics. Overall trends can be summarized as efficiency, environmental protection, functionality, synergy, and specialization."
                        },
                        {
                              "start": 27648,
                              "end": 50711,
                              "text": "Environmental development emphasizes reducing harmful substances such as halogens, antimony, and lead, and developing bio-based, degradable, low-smoke, and low-corrosion products. Efficiency and multifunctionality require lower dosage, less smoke and dripping, and additional functions such as antistatic, antibacterial, or aging resistance."
                        },
                        {
                              "start": 50711,
                              "end": 77015,
                              "text": "Synergistic compounding combines phosphorus, nitrogen, inorganic components, and synergists to achieve an effect greater than the sum of individual parts. Reactive and polymeric flame retardants introduce flame-retardant groups into polymer chains, reducing migration and volatilization. Nanoclay, graphene, nano magnesium oxide, and other new materials can form dense barrier layers."
                        },
                        {
                              "start": 77015,
                              "end": 87022,
                              "text": "In the future, customized systems will be developed for electronics, rail transit, new energy vehicles, construction, and other industries."
                        }
                  ]
            },
            "duration": {
                  "zh": 66.312,
                  "en": 87.022
            },
            "alt": "第33张：6.5 阻燃剂发展现状与开发动向"
      },
      {
            "id": "slide034",
            "index": 34,
            "number": "7.1",
            "title": "7.1 抗静电剂概述",
            "titleEn": "7.1 Overview of Antistatic Agents",
            "image": "player_assets/slide034.webp",
            "audio": {
                  "zh": "player_assets/slide034_zh.mp3",
                  "en": "player_assets/slide034_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide034_zh.vtt",
                  "en": "player_assets/slide034_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 25056,
                              "text": "塑料、橡胶在摩擦、分离和流动过程中容易产生并积累静电。 静电会吸附灰尘、影响外观，也可能损伤电子元器件、引起电击，甚至点燃可燃物。 抗静电剂就是能够防止或消除静电积累的助剂，广泛用于薄膜、橡胶、电子电器、纺织、包装和医疗器械。"
                        },
                        {
                              "start": 25056,
                              "end": 51840,
                              "text": "它主要通过两种机理工作：一是提高材料表面或内部的导电性，形成电荷泄漏通路； 二是提高表面吸湿性，吸收空气中的水分形成导电水膜。 理想抗静电剂用量少、效果明显，不明显影响力学性能、透明度和外观，还要耐迁移、耐热、耐候、安全环保。 应用方式包括内添加和表面处理。"
                        },
                        {
                              "start": 51840,
                              "end": 74207,
                              "text": "内添加在加工时混入树脂，效果持久； 表面处理则形成导电或吸湿层，起效快。 使用后，材料表面电荷可及时消散，从而减少吸尘和放电风险。 核心提示： 抗静电的核心，是降低表面电阻并为电荷建立持续、可控的泄漏通道。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 30120,
                              "text": "Plastics and rubber easily generate and accumulate static electricity during friction, separation, and flow. Static electricity can attract dust and harm appearance. It may also damage electronic components, cause electric shock, or even ignite flammable materials. Antistatic agents are additives that prevent or eliminate static accumulation, and are widely used in films, rubber, electronics, textiles, packaging, and medical devices."
                        },
                        {
                              "start": 30120,
                              "end": 44615,
                              "text": "They mainly work through two mechanisms. One is to improve surface or internal conductivity and form a path for charge leakage. The other is to improve surface moisture absorption, so water from the air forms a conductive film."
                        },
                        {
                              "start": 44615,
                              "end": 73295,
                              "text": "An ideal antistatic agent should work at low dosage, show clear effect, have little influence on mechanical properties, transparency, and appearance, and also be migration resistant, heat resistant, weather resistant, safe, and environmentally friendly. Application methods include internal addition and surface treatment. Internal addition mixes the agent into the resin during processing and gives longer-lasting effect."
                        },
                        {
                              "start": 73295,
                              "end": 94582,
                              "text": "Surface treatment directly forms a conductive or moisture-absorbing layer and works quickly. After use, surface charges can dissipate in time, reducing dust attraction and discharge risk. Key point: antistatic protection means reducing surface resistance and building a continuous, controllable leakage path for charge."
                        }
                  ]
            },
            "duration": {
                  "zh": 74.207,
                  "en": 94.582
            },
            "alt": "第34张：7.1 抗静电剂概述"
      },
      {
            "id": "slide035",
            "index": 35,
            "number": "7.2",
            "title": "7.2 抗静电剂的作用机理",
            "titleEn": "7.2 Mechanisms of Antistatic Agents",
            "image": "player_assets/slide035.webp",
            "audio": {
                  "zh": "player_assets/slide035_zh.mp3",
                  "en": "player_assets/slide035_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide035_zh.vtt",
                  "en": "player_assets/slide035_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 26856,
                              "text": "静电通常经历三个阶段：材料摩擦或分离产生电荷，电荷在表面或内部积累，最后出现吸尘、放电或击穿。 抗静电剂通过提高导电性或吸湿性，使电荷及时泄漏或中和，从而阻止积累。 非离子型抗静电剂会在表面形成亲水层，吸收空气水分并降低表面电阻。"
                        },
                        {
                              "start": 26856,
                              "end": 53136,
                              "text": "离子型抗静电剂含可移动离子，吸湿后形成离子通道，以离子迁移方式导电。 两性离子型同时含阴、阳离子基团，吸湿性和导电能力较强，迁移性相对较低。 内添加型分散在聚合物内部并逐步迁移到表面，形成导电或吸湿层； 外涂型直接在表面形成连续层，起效更快。"
                        },
                        {
                              "start": 53136,
                              "end": 64103,
                              "text": "效果受助剂类型和用量、聚合物极性、环境湿度、温度及表面状态影响，必须通过配方和工艺优化获得持久稳定性能。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 23520,
                              "text": "Static electricity usually goes through three stages: charges are generated by friction or separation, charges accumulate on the surface or inside the material, and finally dust attraction, discharge, or breakdown appears. Antistatic agents prevent accumulation by improving conductivity or moisture absorption so that charges can leak away or be neutralized in time."
                        },
                        {
                              "start": 23520,
                              "end": 50760,
                              "text": "Nonionic antistatic agents form a hydrophilic layer on the surface, absorb moisture from air, and reduce surface resistance. Ionic antistatic agents contain mobile ions. After absorbing moisture, they form ion channels and conduct through ion migration. Amphoteric antistatic agents contain both anionic and cationic groups, giving strong moisture absorption and conductivity with relatively low migration."
                        },
                        {
                              "start": 50760,
                              "end": 80664,
                              "text": "Internal additives disperse inside the polymer and gradually migrate to the surface to form a conductive or moisture-absorbing layer. External coatings directly form a continuous layer on the surface and act faster. Performance is influenced by additive type and dosage, polymer polarity, environmental humidity, temperature, and surface condition. Formulation and process optimization are necessary for durable and stable antistatic performance."
                        }
                  ]
            },
            "duration": {
                  "zh": 64.103,
                  "en": 80.664
            },
            "alt": "第35张：7.2 抗静电剂的作用机理"
      },
      {
            "id": "slide036",
            "index": 36,
            "number": "7.3",
            "title": "7.3 抗静电剂的主要种类",
            "titleEn": "7.3 Main Types of Antistatic Agents",
            "image": "player_assets/slide036.webp",
            "audio": {
                  "zh": "player_assets/slide036_zh.mp3",
                  "en": "player_assets/slide036_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide036_zh.vtt",
                  "en": "player_assets/slide036_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 20663,
                              "text": "抗静电剂按结构和机理可分为离子型、非离子型、两性型、导电型和复合型。 离子型包括季铵盐、吡啶鎓盐等阳离子品种，以及磺酸盐、硫酸盐和羧酸盐等阴离子品种，吸水后形成离子导电层，导电效率较高。"
                        },
                        {
                              "start": 20663,
                              "end": 50591,
                              "text": "非离子型如聚乙二醇、聚丙二醇、脂肪酸酰胺和聚醚类，靠吸湿形成水膜降低表面电阻，吸湿性好但效果较受环境湿度影响。 两性型同时具有阴、阳离子基团，兼具吸湿和离子导电作用，持久性较好。 导电型材料包括导电炭黑、石墨、碳纤维、金属粉末和导电聚合物，可直接建立电子导电网络。"
                        },
                        {
                              "start": 50591,
                              "end": 63214,
                              "text": "复合型则把两种或更多机理组合，实现协同增效。 选择时需考虑树脂极性、制品厚度、使用环境、力学和成本要求。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 28824,
                              "text": "Antistatic agents can be divided by structure and mechanism into ionic, nonionic, amphoteric, conductive, and composite types. Ionic agents include cationic species such as quaternary ammonium salts and pyridinium salts, and anionic species such as sulfonates, sulfates, and carboxylates. After absorbing water, they form ionic conductive layers and have relatively high conductivity."
                        },
                        {
                              "start": 28824,
                              "end": 56592,
                              "text": "Nonionic types include polyethylene glycol, polypropylene glycol, fatty acid amides, and polyethers. They rely on moisture absorption to form a water film and reduce surface resistance. They absorb moisture well, but their effect is more influenced by environmental humidity. Amphoteric types contain both anionic and cationic groups, combining moisture absorption and ionic conduction with better durability."
                        },
                        {
                              "start": 56592,
                              "end": 83952,
                              "text": "Conductive materials include conductive carbon black, graphite, carbon fiber, metal powder, and conductive polymers, which can directly build electronic conductive networks. Composite types combine two or more mechanisms to create synergy. Selection should consider resin polarity, product thickness, use environment, mechanical requirements, and cost."
                        }
                  ]
            },
            "duration": {
                  "zh": 63.214,
                  "en": 83.952
            },
            "alt": "第36张：7.3 抗静电剂的主要种类"
      },
      {
            "id": "slide037",
            "index": 37,
            "number": "7.4",
            "title": "7.4 抗静电剂的应用",
            "titleEn": "7.4 Applications of Antistatic Agents",
            "image": "player_assets/slide037.webp",
            "audio": {
                  "zh": "player_assets/slide037_zh.mp3",
                  "en": "player_assets/slide037_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide037_zh.vtt",
                  "en": "player_assets/slide037_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 25104,
                              "text": "抗静电剂有外部处理和内部添加两条应用路线。 外部法一般先配制0. 1%至2. 0%的溶液，清洗制品后采用涂布、喷雾或浸渍，最后在约50摄氏度条件下干燥。 涂布前要除去油污，水洗后再用醇类处理，并注意无尘施工。 阳离子型和两性型通常效果较好。"
                        },
                        {
                              "start": 25104,
                              "end": 52032,
                              "text": "内部法则把抗静电剂与树脂共混加工，优点是耐洗涤、耐摩擦、耐热且效果持久。 用量并非越多越好，通常随树脂和制品变化：PE、PP常在0. 5%至1. 0%，薄膜用量可更低，厚制品或苯乙烯类材料可能更高。 不同树脂还需针对性选型。 聚烯烃结晶度高，外部迁移较少；"
                        },
                        {
                              "start": 52032,
                              "end": 71855,
                              "text": "PS、ABS需兼顾制品透明和加工； PVC要考虑HCl、增塑剂和稳定剂对抗静电剂的影响。 食品接触和玩具产品还必须关注急性与慢性毒性。 未来方向是耐久、低毒、耐高温和永久抗静电。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 33264,
                              "text": "Antistatic agents can be applied by external treatment or internal addition. In the external method, a solution of about 0. 1 to 2. 0 percent is first prepared. The product is cleaned, then coated, sprayed, or dipped, and finally dried at about 50 degrees Celsius. Before coating, oil should be removed, the surface should be washed with water and treated with alcohol, and dust-free operation is important. Cationic and amphoteric types usually perform well."
                        },
                        {
                              "start": 33264,
                              "end": 63768,
                              "text": "The internal method mixes antistatic agents with resin during processing. Its advantages are resistance to washing, friction, and heat, and a longer-lasting effect. More dosage is not always better. Typical dosage varies with resin and product. PE and PP often use 0. 5 to 1. 0 percent, film may use less, while thick products or styrenic materials may require more. Different resins need targeted selection."
                        },
                        {
                              "start": 63768,
                              "end": 93624,
                              "text": "Polyolefins have high crystallinity and limited outward migration. PS and ABS must balance transparency and processing. PVC requires attention to the influence of HCl, plasticizers, and stabilizers on the antistatic agent. Food-contact and toy products must also consider acute and chronic toxicity. Future development emphasizes durability, low toxicity, high-temperature resistance, and permanent antistatic performance."
                        }
                  ]
            },
            "duration": {
                  "zh": 71.855,
                  "en": 93.624
            },
            "alt": "第37张：7.4 抗静电剂的应用"
      },
      {
            "id": "slide038",
            "index": 38,
            "number": "8.1",
            "title": "8.1 硫化剂与硫化助剂概述",
            "titleEn": "8.1 Overview of Vulcanizing Agents and Vulcanization Auxiliaries",
            "image": "player_assets/slide038.webp",
            "audio": {
                  "zh": "player_assets/slide038_zh.mp3",
                  "en": "player_assets/slide038_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide038_zh.vtt",
                  "en": "player_assets/slide038_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 23832,
                              "text": "橡胶硫化是在一定条件下，借助硫化剂和硫化助剂使橡胶分子链发生交联，形成三维网状结构的过程。 生胶分子链基本呈线性，软、黏、强度低； 硫化后形成网络，强度、弹性、耐磨、耐热和尺寸稳定性显著提高，因此硫化是橡胶工业的核心工艺。"
                        },
                        {
                              "start": 23832,
                              "end": 48408,
                              "text": "硫化剂是引发或形成交联的主要原料，负责提供硫或其他交联元素，并决定交联密度。 硫化助剂则用于促进反应、调节速度、防止早期硫化和改善硫化胶性能，包括促进剂、活性剂、防焦剂、迟延剂等。 硫化剂像主角，硫化助剂像配角，二者必须合理配合。"
                        },
                        {
                              "start": 48408,
                              "end": 61991,
                              "text": "体系选择要根据橡胶种类、制品用途、性能要求和加工条件。 只有交联速度、加工安全与最终性能达到平衡，才能获得优质硫化胶。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 28248,
                              "text": "Rubber vulcanization is the process in which rubber molecular chains are crosslinked under certain conditions with the help of vulcanizing agents and vulcanization auxiliaries, forming a three-dimensional network. Raw rubber chains are basically linear, soft, sticky, and low in strength. After vulcanization, the network structure gives much better strength, elasticity, wear resistance, heat resistance, and dimensional stability."
                        },
                        {
                              "start": 28248,
                              "end": 56928,
                              "text": "Therefore, vulcanization is a core process in the rubber industry. Vulcanizing agents are the main materials that initiate or form crosslinks. They provide sulfur or other crosslinking elements and determine crosslink density. Vulcanization auxiliaries promote the reaction, adjust reaction speed, prevent premature vulcanization, and improve properties of vulcanized rubber. They include accelerators, activators, scorch retarders, and retarders."
                        },
                        {
                              "start": 56928,
                              "end": 79991,
                              "text": "The vulcanizing agent is like the main actor, while auxiliaries are supporting actors. They must be properly matched. System selection depends on rubber type, product use, performance requirements, and processing conditions. Only when crosslinking rate, processing safety, and final properties are balanced can high-quality vulcanized rubber be obtained."
                        }
                  ]
            },
            "duration": {
                  "zh": 61.991,
                  "en": 79.991
            },
            "alt": "第38张：8.1 硫化剂与硫化助剂概述"
      },
      {
            "id": "slide039",
            "index": 39,
            "number": "8.2",
            "title": "8.2 橡胶硫化的基本原理",
            "titleEn": "8.2 Basic Principles of Rubber Vulcanization",
            "image": "player_assets/slide039.webp",
            "audio": {
                  "zh": "player_assets/slide039_zh.mp3",
                  "en": "player_assets/slide039_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide039_zh.vtt",
                  "en": "player_assets/slide039_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 25272,
                              "text": "橡胶硫化的本质是交联反应。 未硫化橡胶的分子链彼此独立，性能和实用价值有限； 形成三维网络后，弹性、硬度、拉伸强度、抗张强度、耐热、耐候和耐溶剂性能明显提高。 交联有两种常见形式。 桥式交联利用硫黄及其同系物或二官能化合物，在分子链之间形成“桥”；"
                        },
                        {
                              "start": 25272,
                              "end": 53760,
                              "text": "碳碳交联则由过氧化物或辐射等产生自由基，使链间碳原子直接连接。 硫黄、秋兰姆、对醌二肟和硫醇等都可形成不同交联结构。 随硫化时间增加，性能先上升，在正硫化点达到最佳，随后过度硫化会引起部分性能下降。 天然橡胶胶料的曲线可能出现返原，而理想曲线应保持平台。"
                        },
                        {
                              "start": 53760,
                              "end": 63335,
                              "text": "配方中还需把硫化剂与促进剂、活性剂和防焦剂组合，使加工安全、反应速度和使用寿命达到平衡。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 24528,
                              "text": "The essence of rubber vulcanization is a crosslinking reaction. In unvulcanized rubber, molecular chains are independent of each other and practical performance is limited. After a three-dimensional network forms, elasticity, hardness, tensile strength, heat resistance, weather resistance, and solvent resistance are greatly improved. There are two common crosslinking forms."
                        },
                        {
                              "start": 24528,
                              "end": 51864,
                              "text": "Bridge crosslinking uses sulfur, sulfur homologues, or bifunctional compounds to form bridges between molecular chains. Carbon-carbon crosslinking uses radicals generated by peroxides or radiation to connect carbon atoms directly between chains. Sulfur, thiurams, p-quinone dioxime, thiols, and other agents can form different crosslink structures."
                        },
                        {
                              "start": 51864,
                              "end": 78840,
                              "text": "As vulcanization time increases, properties first improve and reach the optimum cure point, then over-vulcanization may reduce some properties. Natural rubber compounds may show reversion, while an ideal curve should maintain a plateau. The formulation must combine vulcanizing agents with accelerators, activators, and scorch retarders so that processing safety, reaction speed, and service life are balanced."
                        }
                  ]
            },
            "duration": {
                  "zh": 63.335,
                  "en": 78.84
            },
            "alt": "第39张：8.2 橡胶硫化的基本原理"
      },
      {
            "id": "slide040",
            "index": 40,
            "number": "8.3",
            "title": "8.3 硫化剂各论",
            "titleEn": "8.3 Main Vulcanizing Agents",
            "image": "player_assets/slide040.webp",
            "audio": {
                  "zh": "player_assets/slide040_zh.mp3",
                  "en": "player_assets/slide040_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide040_zh.vtt",
                  "en": "player_assets/slide040_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 28296,
                              "text": "硫化剂是使橡胶发生交联的主要药剂，不同品种的活性、适用胶种、硫化速度和最终性能各不相同。 硫黄最常用、来源丰富且成本低，适合多数通用橡胶，但可能出现硫化返原和喷霜。 有机过氧化物受热产生自由基，形成稳定的碳碳交联，适合EPDM等不饱和度较低的橡胶，耐热耐老化性能好。"
                        },
                        {
                              "start": 28296,
                              "end": 53352,
                              "text": "氧化锌、氧化镁等金属氧化物常与活化剂配合，对某些橡胶形成金属皂或离子交联。 酚醛树脂硫化温度较低、机械性能好，常用于丁基橡胶等。 胺类活性高，常作超速硫化剂或后效性硫化剂； 秋兰姆类活性可调，既可作主硫化剂也可作辅助促进剂。"
                        },
                        {
                              "start": 53352,
                              "end": 62615,
                              "text": "另有酸酐、三聚氰胺、咪唑、马来酰亚胺和不饱和单体等特殊交联剂，用于特种橡胶或热固性树脂。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 27312,
                              "text": "Vulcanizing agents are the main chemicals that crosslink rubber. Different types have different activity, suitable rubber types, curing speed, and final properties. Sulfur is the most widely used. It is abundant and low-cost, and suits most general-purpose rubbers, but it may cause reversion and sulfur blooming. Organic peroxides decompose under heat to form radicals and create stable carbon-carbon crosslinks."
                        },
                        {
                              "start": 27312,
                              "end": 53904,
                              "text": "They are suitable for rubbers with lower unsaturation, such as EPDM, and give good heat and aging resistance. Metal oxides such as zinc oxide and magnesium oxide are often used with activators, and in some rubbers they form metal soap or ionic crosslinks. Phenolic resins cure at relatively low temperature and give good mechanical properties, often used for butyl rubber."
                        },
                        {
                              "start": 53904,
                              "end": 79824,
                              "text": "Amines have high activity and are often used as ultra-fast or delayed-action vulcanizing agents. Thiurams have adjustable activity and may act as main vulcanizing agents or auxiliary accelerators. Other special crosslinking agents include acid anhydrides, melamine, imidazoles, maleimides, and unsaturated monomers, used for specialty rubbers or thermosetting resins."
                        }
                  ]
            },
            "duration": {
                  "zh": 62.615,
                  "en": 79.824
            },
            "alt": "第40张：8.3 硫化剂各论"
      },
      {
            "id": "slide041",
            "index": 41,
            "number": "8.4",
            "title": "8.4 硫化剂作用机理",
            "titleEn": "8.4 Mechanisms of Vulcanizing Agents",
            "image": "player_assets/slide041.webp",
            "audio": {
                  "zh": "player_assets/slide041_zh.mp3",
                  "en": "player_assets/slide041_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide041_zh.vtt",
                  "en": "player_assets/slide041_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 26520,
                              "text": "不同硫化剂通过不同化学路径使高分子链交联。 硫黄在加热和促进剂作用下形成活性硫，在不饱和橡胶双键附近建立单硫、双硫或多硫桥，提高强度、弹性和耐热性能。 氧化锌本身常作为活化剂，与脂肪酸生成锌皂，加速活性硫物种形成，降低硫化温度并改善硫化胶性能。"
                        },
                        {
                              "start": 26520,
                              "end": 52800,
                              "text": "过氧化物受热分解为自由基，自由基从聚合物链夺氢并使链间形成碳碳键，交联耐热且稳定。 金属氧化物和金属盐还能与羧基等官能团形成配位键或离子键。 异氰酸酯与羟基或氨基反应，生成氨基甲酸酯键或脲键； 醛类可与含氨基聚合物缩合形成亚胺键网络。"
                        },
                        {
                              "start": 52800,
                              "end": 59064,
                              "text": "合理选择体系，才能控制交联密度、耐热性、耐老化和加工条件。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 25752,
                              "text": "Different vulcanizing agents crosslink polymer chains through different chemical paths. Under heat and accelerator action, sulfur forms active sulfur species and creates monosulfide, disulfide, or polysulfide bridges near double bonds in unsaturated rubber. These bridges improve strength, elasticity, and heat resistance. Zinc oxide often acts as an activator."
                        },
                        {
                              "start": 25752,
                              "end": 49392,
                              "text": "It reacts with fatty acids to form zinc soap, accelerates the formation of active sulfur species, lowers vulcanization temperature, and improves rubber properties. Peroxides decompose under heat into radicals. These radicals abstract hydrogen from polymer chains and form carbon-carbon bonds between chains, giving heat-resistant and stable crosslinks."
                        },
                        {
                              "start": 49392,
                              "end": 77640,
                              "text": "Metal oxides and metal salts can also form coordination or ionic bonds with carboxyl and other functional groups. Isocyanates react with hydroxyl or amino groups to form urethane or urea bonds. Aldehydes can condense with amino-containing polymers to form imine networks. Only by selecting the system properly can crosslink density, heat resistance, aging resistance, and processing conditions be controlled."
                        }
                  ]
            },
            "duration": {
                  "zh": 59.064,
                  "en": 77.64
            },
            "alt": "第41张：8.4 硫化剂作用机理"
      },
      {
            "id": "slide042",
            "index": 42,
            "number": "8.5",
            "title": "8.5 硫化促进剂",
            "titleEn": "8.5 Vulcanization Accelerators",
            "image": "player_assets/slide042.webp",
            "audio": {
                  "zh": "player_assets/slide042_zh.mp3",
                  "en": "player_assets/slide042_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide042_zh.vtt",
                  "en": "player_assets/slide042_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 21815,
                              "text": "硫化促进剂能够缩短硫化时间、降低硫化温度、减少硫黄用量，并提高硫化胶的抗张强度、拉伸强度、耐磨、耐老化和储存稳定性。 早期曾按促进速度分为超速、半超速、中速和低速，但这种方法不能充分反映促进剂结构和实际作用。"
                        },
                        {
                              "start": 21815,
                              "end": 51551,
                              "text": "现代通常按化学结构分类，包括二硫代氨基甲酸盐、秋兰姆、黄原酸盐、噻唑、次磺酰胺、硫脲、胍、醛胺和混合促进剂等。 促进机理较复杂，但总体上是促进剂参与硫黄活化，形成活性中间体，使硫更高效地与橡胶分子链交联。 二硫代氨基甲酸盐活性很高，适合快速或低温硫化；"
                        },
                        {
                              "start": 51551,
                              "end": 66838,
                              "text": "秋兰姆可作促进剂，也可作无硫硫化剂； 噻唑耐热安全性较好； 其他品种常通过复配调节焦烧安全和硫化速度。 合理搭配才能得到高效、稳定的硫化体系。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 28320,
                              "text": "Vulcanization accelerators shorten curing time, lower curing temperature, reduce sulfur dosage, and improve tensile strength, wear resistance, aging resistance, and storage stability of vulcanized rubber. In earlier practice, accelerators were classified by speed as ultra-fast, semi-ultra-fast, medium, and slow, but this method does not fully reflect structure and practical function."
                        },
                        {
                              "start": 28320,
                              "end": 57000,
                              "text": "Modern classification usually follows chemical structure, including dithiocarbamates, thiurams, xanthates, thiazoles, sulfenamides, thioureas, guanidines, aldehyde-amines, and mixed accelerators. The mechanism is complex, but in general accelerators participate in sulfur activation and form active intermediates, allowing sulfur to crosslink rubber chains more efficiently."
                        },
                        {
                              "start": 57000,
                              "end": 81840,
                              "text": "Dithiocarbamates have very high activity and are suitable for fast or low-temperature vulcanization. Thiurams can act as accelerators and also as sulfur-free vulcanizing agents. Thiazoles have better heat and processing safety. Other types are often combined to adjust scorch safety and curing rate. Proper matching is necessary for an efficient and stable vulcanization system."
                        }
                  ]
            },
            "duration": {
                  "zh": 66.838,
                  "en": 81.84
            },
            "alt": "第42张：8.5 硫化促进剂"
      },
      {
            "id": "slide043",
            "index": 43,
            "number": "8.6",
            "title": "8.6 硫化活性剂",
            "titleEn": "8.6 Vulcanization Activators",
            "image": "player_assets/slide043.webp",
            "audio": {
                  "zh": "player_assets/slide043_zh.mp3",
                  "en": "player_assets/slide043_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide043_zh.vtt",
                  "en": "player_assets/slide043_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 17927,
                              "text": "硫化活性剂是能够增强有机促进剂活性、加快反应或缩短硫化时间的助剂。 它与促进剂共同形成活性中间体，或改善体系的反应环境，从而提高交联效率和硫化胶性能。 活性剂可分为无机和有机两类。"
                        },
                        {
                              "start": 17927,
                              "end": 47015,
                              "text": "无机活性剂主要是金属氧化物，其中氧化锌最重要、应用最广，氧化镁可与其配合，氧化钙和氧化铅则用于特定体系。 有机活性剂包括硬脂酸、月桂酸和二乙醇胺等，其中硬脂酸可与氧化锌生成锌皂，提高促进剂活性。 使用活性剂后，可以减少促进剂用量、缩短硫化时间、提高交联度和热稳定性。"
                        },
                        {
                              "start": 47015,
                              "end": 65902,
                              "text": "但必须控制用量、保证分散均匀、注意与酸性物质和其他助剂的相容，并结合胶种、促进剂和硫化温度选择。 核心提示： 活性剂不是主硫化剂，却是提高促进效率、降低成本和稳定硫化过程的重要环节。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 26544,
                              "text": "Vulcanization activators are additives that enhance the activity of organic accelerators, speed up reactions, or shorten vulcanization time. Together with accelerators, they form active intermediates or improve the reaction environment, thereby increasing crosslinking efficiency and properties of vulcanized rubber. Activators are divided into inorganic and organic types. Inorganic activators are mainly metal oxides."
                        },
                        {
                              "start": 26544,
                              "end": 51168,
                              "text": "Zinc oxide is the most important and most widely used. Magnesium oxide can be used with it, while calcium oxide and lead oxide are used in specific systems. Organic activators include stearic acid, lauric acid, and diethanolamine. Stearic acid can react with zinc oxide to form zinc soap and improve accelerator activity."
                        },
                        {
                              "start": 51168,
                              "end": 75432,
                              "text": "After activators are used, accelerator dosage can be reduced, vulcanization time shortened, crosslink density improved, and heat stability enhanced. However, dosage must be controlled, dispersion must be uniform, compatibility with acidic substances and other additives must be considered, and selection should depend on rubber type, accelerator, and curing temperature."
                        },
                        {
                              "start": 75432,
                              "end": 87263,
                              "text": "Key point: an activator is not the main vulcanizing agent, but it is important for improving acceleration efficiency, reducing cost, and stabilizing the vulcanization process."
                        }
                  ]
            },
            "duration": {
                  "zh": 65.902,
                  "en": 87.263
            },
            "alt": "第43张：8.6 硫化活性剂"
      },
      {
            "id": "slide044",
            "index": 44,
            "number": "8.7",
            "title": "8.7 防焦剂",
            "titleEn": "8.7 Scorch Retarders",
            "image": "player_assets/slide044.webp",
            "audio": {
                  "zh": "player_assets/slide044_zh.mp3",
                  "en": "player_assets/slide044_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide044_zh.vtt",
                  "en": "player_assets/slide044_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 24384,
                              "text": "橡胶在最终硫化前要经历塑炼、混炼、压延、压出、停放和储存等过程。 机械生热或环境温度过高，可能使胶料提前交联，出现变硬、塑性下降和难加工，这就是焦烧。 防焦剂只需少量加入，就能延迟早期硫化，因此也叫硫化延迟剂。"
                        },
                        {
                              "start": 24384,
                              "end": 53136,
                              "text": "防焦的意义在于提高加工和储存安全性，延长焦烧时间，减少胶料报废和设备损伤，同时保证制品外观与质量。 理想防焦剂应有效防焦，但在正式硫化开始后不明显降低硫化速度，不延长总硫化时间，也不损害硫化胶的物理、化学和使用性能。 选择时要结合生胶种类、硫化体系、加工过程和温度。"
                        },
                        {
                              "start": 53136,
                              "end": 67871,
                              "text": "常见防焦剂有有机酸、亚硝基化合物和硫代酰亚胺类，其中CTP使用广泛。 CTP与次磺酰胺促进剂并用，通常可显著延长焦烧时间而不影响正常硫化。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 30144,
                              "text": "Before final vulcanization, rubber goes through mastication, mixing, calendering, extrusion, storage, and other operations. Mechanical heat or high ambient temperature may cause the compound to crosslink too early, making it hard, reducing plasticity, and causing processing difficulty. This is scorch. A small amount of scorch retarder can delay early vulcanization, so it is also called a vulcanization retarder."
                        },
                        {
                              "start": 30144,
                              "end": 56688,
                              "text": "The purpose of scorch prevention is to improve processing and storage safety, extend scorch time, reduce scrap and equipment damage, and ensure product appearance and quality. An ideal scorch retarder should effectively prevent scorch, but after formal vulcanization begins, it should not obviously reduce curing speed, extend total curing time, or damage physical, chemical, and service properties of the vulcanizate."
                        },
                        {
                              "start": 56688,
                              "end": 80184,
                              "text": "Selection should consider raw rubber type, vulcanization system, processing steps, and temperature. Common scorch retarders include organic acids, nitroso compounds, and thioimides. CTP is widely used. When CTP is used with sulfenamide accelerators, it can usually greatly extend scorch time without affecting normal vulcanization."
                        }
                  ]
            },
            "duration": {
                  "zh": 67.871,
                  "en": 80.184
            },
            "alt": "第44张：8.7 防焦剂"
      },
      {
            "id": "slide045",
            "index": 45,
            "number": "8.8",
            "title": "8.8 几种常见的硫化体系",
            "titleEn": "8.8 Common Vulcanization Systems",
            "image": "player_assets/slide045.webp",
            "audio": {
                  "zh": "player_assets/slide045_zh.mp3",
                  "en": "player_assets/slide045_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide045_zh.vtt",
                  "en": "player_assets/slide045_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 30648,
                              "text": "橡胶必须通过硫化体系形成交联网络，才能提高弹性、强度和耐热性。 常见体系分为硫黄硫化和非硫黄硫化。 普通硫黄硫化适合天然橡胶、SBR、NBR、IIR和EPDM等，初始性能好，但多硫键比例高时耐热氧老化较弱。 非硫黄体系包括过氧化物、金属氧化物、酚醛树脂、醌类衍生物和马来酰亚胺等。"
                        },
                        {
                              "start": 30648,
                              "end": 57672,
                              "text": "过氧化物形成碳碳交联，热稳定和耐老化较好，但动态性能和气味等需综合考虑。 配方中酸性物会影响过氧化物交联，少量碱性组分可提高效率，ZnO与硬脂酸等组分也要正确理解其活化和分散作用。 金属氧化物常用于氯丁橡胶、氯化橡胶等体系，ZnO与MgO并用效果较好。"
                        },
                        {
                              "start": 57672,
                              "end": 69455,
                              "text": "酚醛树脂适合IIR，醌类耐热但成本较高，马来酰亚胺可提高交联速度。 选择时应依据胶种、耐热要求和制品用途。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 30816,
