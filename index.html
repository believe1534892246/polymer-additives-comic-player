                              "text": "Rubber must form a crosslinked network through a vulcanization system in order to improve elasticity, strength, and heat resistance. Common systems are divided into sulfur vulcanization and non-sulfur vulcanization. Conventional sulfur vulcanization is suitable for natural rubber, SBR, NBR, IIR, EPDM, and others. It gives good initial properties, but when the proportion of polysulfide bonds is high, heat-oxygen aging resistance is weaker."
                        },
                        {
                              "start": 30816,
                              "end": 56520,
                              "text": "Non-sulfur systems include peroxides, metal oxides, phenolic resins, quinone derivatives, and maleimides. Peroxides form carbon-carbon crosslinks and give better heat stability and aging resistance, but dynamic properties and odor must be considered. Acidic components in the formulation affect peroxide crosslinking, while small amounts of basic components can improve efficiency."
                        },
                        {
                              "start": 56520,
                              "end": 90120,
                              "text": "ZnO, stearic acid, and related components must also be correctly understood for activation and dispersion. Metal oxides are often used for chloroprene rubber, chlorinated rubber, and similar systems, and ZnO used with MgO often works well. Phenolic resin suits IIR, quinone systems have good heat resistance but high cost, and maleimides can improve crosslinking speed. Selection should be based on rubber type, heat-resistance requirements, and product use."
                        }
                  ]
            },
            "duration": {
                  "zh": 69.455,
                  "en": 90.12
            },
            "alt": "第45张：8.8 几种常见的硫化体系"
      },
      {
            "id": "slide046",
            "index": 46,
            "number": "9.1",
            "title": "9.1 填充剂",
            "titleEn": "9.1 Fillers",
            "image": "player_assets/slide046.webp",
            "audio": {
                  "zh": "player_assets/slide046_zh.mp3",
                  "en": "player_assets/slide046_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide046_zh.vtt",
                  "en": "player_assets/slide046_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 18959,
                              "text": "填充剂是加入塑料或橡胶中的粉末、粒状或纤维状材料，常用于改善性能、降低成本或赋予特殊功能。 它既能增加制品体积、提高产量和减少树脂用量，也可改善硬度、尺寸稳定、耐热、绝缘或阻燃等性能。"
                        },
                        {
                              "start": 18959,
                              "end": 42719,
                              "text": "按来源和功能，可分为碳酸钙、滑石粉、白炭黑、高岭土、云母等无机填料，木粉和有机纤维等有机填料，以及玻璃纤维、炭黑等功能性填料。 适量填充可能提高刚性、硬度和耐热性，并降低成本； 过量则可能降低韧性、透明性和冲击强度，使加工与表面质量变差。"
                        },
                        {
                              "start": 42719,
                              "end": 63718,
                              "text": "使用时，填料应先与树脂充分混合，再经过分散和成型。 分散均匀是发挥性能的关键，团聚会造成缺陷。 选型还要考虑粒径形状、白度颜色、纯度、表面处理、分散性、与树脂的相容性、力学影响和成本。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 25512,
                              "text": "Fillers are powder, granular, or fibrous materials added to plastics or rubber, often to improve properties, reduce cost, or provide special functions. They can increase product volume, raise output, and reduce resin consumption. They may also improve hardness, dimensional stability, heat resistance, insulation, flame retardancy, and other properties."
                        },
                        {
                              "start": 25512,
                              "end": 56040,
                              "text": "By source and function, fillers include inorganic fillers such as calcium carbonate, talc, silica, kaolin, and mica; organic fillers such as wood flour and organic fibers; and functional fillers such as glass fiber and carbon black. Proper filling may increase rigidity, hardness, and heat resistance while lowering cost. Excessive filling may reduce toughness, transparency, and impact strength, and may worsen processing and surface quality."
                        },
                        {
                              "start": 56040,
                              "end": 80760,
                              "text": "In use, the filler should first be thoroughly mixed with resin, then dispersed and formed. Uniform dispersion is the key to performance, while agglomeration causes defects. Selection should consider particle size and shape, whiteness and color, purity, surface treatment, dispersibility, compatibility with resin, mechanical influence, and cost."
                        }
                  ]
            },
            "duration": {
                  "zh": 63.718,
                  "en": 80.76
            },
            "alt": "第46张：9.1 填充剂"
      },
      {
            "id": "slide047",
            "index": 47,
            "number": "9.2",
            "title": "9.2 润滑剂",
            "titleEn": "9.2 Lubricants",
            "image": "player_assets/slide047.webp",
            "audio": {
                  "zh": "player_assets/slide047_zh.mp3",
                  "en": "player_assets/slide047_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide047_zh.vtt",
                  "en": "player_assets/slide047_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 26328,
                              "text": "润滑剂用于降低聚合物加工中物料与金属表面、以及物料内部之间的摩擦和黏附，从而改善加工工艺、制品质量和生产效率。 它可在聚合物与设备之间形成薄膜，降低摩擦，防止熔体黏附并促进脱模。 润滑剂应与树脂相容适度、耐热、不易析出，且不影响透明度和表面性能。"
                        },
                        {
                              "start": 26328,
                              "end": 54216,
                              "text": "按作用可分为外部润滑剂、内部润滑剂、复合润滑剂和加工助剂型润滑剂。 塑料挤出、注塑、压延和吹膜中，润滑剂可降低熔体与设备摩擦、减少黏模并改善表面； 橡胶混炼、压出和模压中，则有利于流动、脱模和减少损伤。 常见品种包括金属皂、脂肪酸及酯、石蜡和聚乙烯蜡、硅油等。"
                        },
                        {
                              "start": 54216,
                              "end": 64319,
                              "text": "使用时要选择与树脂相容的品种，控制用量，避免过量引起发花或爽滑异常，并注意与其他助剂的相容和协同。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 22727,
                              "text": "Lubricants reduce friction and adhesion between polymer materials and metal surfaces, and also within the material itself during processing. They improve processing, product quality, and production efficiency. A lubricant can form a thin film between polymer and equipment, reduce friction, prevent melt adhesion, and promote mold release."
                        },
                        {
                              "start": 22727,
                              "end": 42982,
                              "text": "Lubricants should have suitable compatibility with resin, good heat resistance, low tendency to exude, and little influence on transparency and surface properties. By function, they are divided into external lubricants, internal lubricants, compound lubricants, and processing-aid lubricants."
                        },
                        {
                              "start": 42982,
                              "end": 73222,
                              "text": "In plastic extrusion, injection molding, calendering, and film blowing, lubricants reduce friction between melt and equipment, reduce mold sticking, and improve surface quality. In rubber mixing, extrusion, and molding, they help flow, release, and reduce damage. Common types include metal soaps, fatty acids and esters, paraffin and polyethylene wax, and silicone oil."
                        },
                        {
                              "start": 73222,
                              "end": 85845,
                              "text": "In use, select a type compatible with the resin, control dosage, avoid blooming or abnormal slip caused by excess, and consider compatibility and synergy with other additives."
                        }
                  ]
            },
            "duration": {
                  "zh": 64.319,
                  "en": 85.845
            },
            "alt": "第47张：9.2 润滑剂"
      },
      {
            "id": "slide048",
            "index": 48,
            "number": "9.3",
            "title": "9.3 发泡剂",
            "titleEn": "9.3 Foaming Agents",
            "image": "player_assets/slide048.webp",
            "audio": {
                  "zh": "player_assets/slide048_zh.mp3",
                  "en": "player_assets/slide048_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide048_zh.vtt",
                  "en": "player_assets/slide048_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 23327,
                              "text": "发泡剂能使橡胶或塑料形成微孔结构，让材料更轻、更柔软，并获得保温和隔音性能。 它可以是固体、液体或气体。 物理发泡剂依靠自身物理状态变化产生气体，包括压缩气体、挥发性液体和可溶性固体； 化学发泡剂则受热分解或反应释放气体。"
                        },
                        {
                              "start": 23327,
                              "end": 52727,
                              "text": "无机化学发泡剂有碳酸氢盐、亚硝酸盐、硼氢化物和过氧化氢等； 有机化学发泡剂常含偶氮或相关含氮结构，受热释放氮气，分散性和发泡率较好。 关键指标包括分解温度和发气量：温度要与树脂加工窗口匹配，发气量影响泡孔数量和用量。 选用时还要关注残渣、气味、粉尘和可燃性。"
                        },
                        {
                              "start": 52727,
                              "end": 65734,
                              "text": "发泡助剂可调节分解温度和速度，改善工艺并稳定泡孔。 最终要结合聚合物、加工温度、发气量、残渣和安全性，获得均匀细密的泡孔结构。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 31392,
                              "text": "Foaming agents allow rubber or plastic to form a microcellular structure, making materials lighter and softer, and giving thermal insulation and sound insulation properties. A foaming agent may be solid, liquid, or gas. Physical foaming agents produce gas through changes in physical state, including compressed gases, volatile liquids, and soluble solids. Chemical foaming agents release gas by thermal decomposition or reaction."
                        },
                        {
                              "start": 31392,
                              "end": 62904,
                              "text": "Inorganic chemical foaming agents include bicarbonates, nitrites, borohydrides, and hydrogen peroxide. Organic chemical foaming agents often contain azo or related nitrogen-containing structures and release nitrogen when heated, giving good dispersion and foaming efficiency. Key indicators include decomposition temperature and gas yield. The temperature should match the resin processing window, while gas yield affects cell quantity and dosage."
                        },
                        {
                              "start": 62904,
                              "end": 85991,
                              "text": "Selection should also consider residue, odor, dust, and flammability. Foaming auxiliaries can adjust decomposition temperature and rate, improve processability, and stabilize cells. The final goal is to match polymer, processing temperature, gas yield, residue, and safety to obtain a uniform and fine cell structure."
                        }
                  ]
            },
            "duration": {
                  "zh": 65.734,
                  "en": 85.991
            },
            "alt": "第48张：9.3 发泡剂"
      },
      {
            "id": "slide049",
            "index": 49,
            "number": "9.4",
            "title": "9.4 着色剂",
            "titleEn": "9.4 Colorants",
            "image": "player_assets/slide049.webp",
            "audio": {
                  "zh": "player_assets/slide049_zh.mp3",
                  "en": "player_assets/slide049_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide049_zh.vtt",
                  "en": "player_assets/slide049_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 31560,
                              "text": "着色剂赋予塑料制品丰富的颜色和外观，主要分为不溶性的颜料和可溶性的染料。 颜料又包括钛白、氧化铁、铬黄、酞菁蓝和炭黑等无机或有机品种； 染料则有蒽醌、苯胺油溶性和金属配合物等类型。 评价着色剂要看着色力、遮盖力和分散性，还要考察耐热、耐候、耐迁移、化学稳定、电气性能和毒性。"
                        },
                        {
                              "start": 31560,
                              "end": 59088,
                              "text": "加工温度高时应避免热变色； 户外制品需要耐光耐雨； 电缆着色剂不能明显损害绝缘； 食品包装和玩具必须符合安全法规。 应用形式包括颗粒状色料、干色料和湿润性色料。 色母粒由高浓度颜料与树脂制成，分散好、使用方便且少粉尘； 干色料成本较低但易飞扬、计量和分散较难；"
                        },
                        {
                              "start": 59088,
                              "end": 66720,
                              "text": "湿润性色料无飞散、用途广。 正确选型和合理分散可提升制品质量与寿命。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 24888,
                              "text": "Colorants give plastic products rich color and appearance. They are mainly divided into insoluble pigments and soluble dyes. Pigments include inorganic and organic types such as titanium white, iron oxide, chrome yellow, phthalocyanine blue, and carbon black. Dyes include anthraquinone, aniline oil-soluble dyes, and metal complex dyes."
                        },
                        {
                              "start": 24888,
                              "end": 56352,
                              "text": "Evaluation of a colorant includes tinting strength, hiding power, and dispersibility, as well as heat resistance, weather resistance, migration resistance, chemical stability, electrical properties, and toxicity. At high processing temperature, thermal discoloration should be avoided. Outdoor products need resistance to light and rain. Colorants for cables should not significantly damage insulation. Food packaging and toys must meet safety regulations."
                        },
                        {
                              "start": 56352,
                              "end": 83856,
                              "text": "Application forms include granular colorants, dry colorants, and wet colorants. Masterbatch is made from high-concentration pigment and resin. It has good dispersion, convenient use, and little dust. Dry colorants are low-cost but dusty and harder to measure and disperse. Wet colorants have no dust and broad use. Correct selection and good dispersion can improve product quality and service life."
                        }
                  ]
            },
            "duration": {
                  "zh": 66.72,
                  "en": 83.856
            },
            "alt": "第49张：9.4 着色剂"
      }
];
    const image = document.getElementById('slideImage');
    const title = document.getElementById('title');
    const kicker = document.getElementById('kicker');
    const counter = document.getElementById('counter');
    const topicSelect = document.getElementById('topicSelect');
    const prevBtn = document.getElementById('prevBtn');
    const playBtn = document.getElementById('playBtn');
    const nextBtn = document.getElementById('nextBtn');
    const voiceZhBtn = document.getElementById('voiceZhBtn');
    const voiceEnBtn = document.getElementById('voiceEnBtn');
    const subZhBtn = document.getElementById('subZhBtn');
    const subEnBtn = document.getElementById('subEnBtn');
    const subOffBtn = document.getElementById('subOffBtn');
    const panelToggleBtn = document.getElementById('panelToggleBtn');
    const audio = document.getElementById('audio');
    const caption = document.getElementById('caption');
    const pageProgress = document.getElementById('pageProgress');
    const currentTime = document.getElementById('currentTime');
    const duration = document.getElementById('duration');
    const totalTime = document.getElementById('totalTime');
    const totalFill = document.getElementById('totalFill');
    let currentIndex = 0;
    let voiceLang = 'zh';
    let subtitleLang = 'zh';
    let continuous = false;
    let seeking = false;
    let cues = [];
    let controlsCollapsed = false;

    slides.forEach((slide, index) => {
      const option = document.createElement('option');
      option.value = String(index);
      option.textContent = `${String(index + 1).padStart(2, '0')} - ${slide.title}`;
      topicSelect.appendChild(option);
    });

    function formatTime(value) {
      if (!Number.isFinite(value)) return '00:00';
      const total = Math.max(0, Math.floor(value));
      return `${String(Math.floor(total / 60)).padStart(2, '0')}:${String(total % 60).padStart(2, '0')}`;
    }

    function slideDuration(index, lang = voiceLang) {
      return slides[index].duration[lang] || 0;
    }

    function totalDuration() {
      return slides.reduce((sum, slide) => sum + (slide.duration[voiceLang] || 0), 0);
    }

    function elapsedBefore(index) {
      return slides.slice(0, index).reduce((sum, slide) => sum + (slide.duration[voiceLang] || 0), 0);
    }

    function updateTotalProgress() {
      const current = elapsedBefore(currentIndex) + (Number.isFinite(audio.currentTime) ? audio.currentTime : 0);
      const total = totalDuration();
      const percent = total ? Math.min(100, (current / total) * 100) : 0;
      totalFill.style.width = `${percent}%`;
      totalTime.textContent = `${formatTime(current)} / ${formatTime(total)}`;
    }

    function updateCaption() {
      if (subtitleLang === 'off' || !cues.length) {
        caption.textContent = '';
        caption.classList.remove('visible');
        return;
      }
      const now = (audio.currentTime || 0) * 1000;
      const cue = cues.find((item) => now >= item.start && now <= item.end);
      if (cue) {
        caption.textContent = cue.text;
        caption.classList.add('visible');
      } else {
        caption.textContent = '';
        caption.classList.remove('visible');
      }
    }

    function updatePageProgress() {
      const knownDuration = Number.isFinite(audio.duration) ? audio.duration : slideDuration(currentIndex);
      currentTime.textContent = formatTime(audio.currentTime || 0);
      duration.textContent = formatTime(knownDuration);
      if (!seeking && knownDuration) {
        pageProgress.value = Math.round(((audio.currentTime || 0) / knownDuration) * 1000);
      }
      updateTotalProgress();
      updateCaption();
    }

    function loadCaptions() {
      cues = [];
      updateCaption();
      if (subtitleLang === 'off') return;
      const slide = slides[currentIndex];
      cues = (slide.cues && slide.cues[subtitleLang]) ? slide.cues[subtitleLang] : [];
      updateCaption();
    }

    function setActiveButtons() {
      voiceZhBtn.classList.toggle('active', voiceLang === 'zh');
      voiceEnBtn.classList.toggle('active', voiceLang === 'en');
      subZhBtn.classList.toggle('active', subtitleLang === 'zh');
      subEnBtn.classList.toggle('active', subtitleLang === 'en');
      subOffBtn.classList.toggle('active', subtitleLang === 'off');
    }

    function preloadAround(index) {
      [index + 1, index + 2].forEach((target) => {
        if (!slides[target]) return;
        const nextImage = new Image();
        nextImage.decoding = 'async';
        nextImage.src = slides[target].image;
        const nextAudio = document.createElement('audio');
        nextAudio.preload = 'metadata';
        nextAudio.src = slides[target].audio[voiceLang];
      });
    }

    function setSlide(index, shouldPlay = false) {
      currentIndex = Math.max(0, Math.min(slides.length - 1, index));
      const slide = slides[currentIndex];
      audio.pause();
      image.src = slide.image;
      image.alt = slide.alt;
      title.textContent = slide.title;
      kicker.textContent = `第 ${currentIndex + 1} 张 / 共 ${slides.length} 张`;
      counter.textContent = `${currentIndex + 1} / ${slides.length}`;
      topicSelect.value = String(currentIndex);
      audio.src = slide.audio[voiceLang];
      audio.load();
      pageProgress.value = 0;
      currentTime.textContent = '00:00';
      duration.textContent = formatTime(slideDuration(currentIndex));
      updateTotalProgress();
      loadCaptions();
      preloadAround(currentIndex);
      if (shouldPlay) {
        continuous = true;
        audio.play().catch(() => {});
      } else {
        playBtn.textContent = '连续播放';
      }
    }

    function setVoice(lang) {
      if (voiceLang === lang) return;
      const wasPlaying = !audio.paused;
      const oldDuration = Number.isFinite(audio.duration) ? audio.duration : slideDuration(currentIndex, voiceLang);
      const ratio = oldDuration ? (audio.currentTime || 0) / oldDuration : 0;
      voiceLang = lang;
      setActiveButtons();
      const slide = slides[currentIndex];
      audio.pause();
      audio.src = slide.audio[voiceLang];
      audio.load();
      audio.addEventListener('loadedmetadata', function restorePosition() {
        audio.removeEventListener('loadedmetadata', restorePosition);
        if (Number.isFinite(audio.duration) && ratio > 0) {
          audio.currentTime = Math.min(audio.duration - 0.2, Math.max(0, ratio * audio.duration));
        }
        updatePageProgress();
        if (wasPlaying) audio.play().catch(() => {});
      });
      updateTotalProgress();
    }

    function setSubtitle(lang) {
      subtitleLang = lang;
      setActiveButtons();
      loadCaptions();
    }

    function setControlsCollapsed(collapsed) {
      controlsCollapsed = collapsed;
      document.body.classList.toggle('controls-collapsed', controlsCollapsed);
      panelToggleBtn.textContent = controlsCollapsed ? '展开' : '折叠';
      panelToggleBtn.setAttribute('aria-expanded', String(!controlsCollapsed));
      panelToggleBtn.setAttribute('aria-label', controlsCollapsed ? '展开播放控制区' : '折叠播放控制区');
      requestAnimationFrame(updatePageProgress);
    }

    topicSelect.addEventListener('change', () => setSlide(Number(topicSelect.value), true));
    prevBtn.addEventListener('click', () => setSlide(currentIndex - 1, !audio.paused || continuous));
    nextBtn.addEventListener('click', () => setSlide(currentIndex + 1, !audio.paused || continuous));
    voiceZhBtn.addEventListener('click', () => setVoice('zh'));
    voiceEnBtn.addEventListener('click', () => setVoice('en'));
    subZhBtn.addEventListener('click', () => setSubtitle('zh'));
    subEnBtn.addEventListener('click', () => setSubtitle('en'));
    subOffBtn.addEventListener('click', () => setSubtitle('off'));
    panelToggleBtn.addEventListener('click', () => setControlsCollapsed(!controlsCollapsed));
    playBtn.addEventListener('click', () => {
      continuous = true;
      if (audio.paused) {
        audio.play().catch(() => {});
      } else {
        audio.pause();
      }
    });
    audio.addEventListener('play', () => { playBtn.textContent = '暂停'; });
    audio.addEventListener('pause', () => { if (!audio.ended) playBtn.textContent = '连续播放'; });
    audio.addEventListener('loadedmetadata', updatePageProgress);
    audio.addEventListener('timeupdate', updatePageProgress);
    audio.addEventListener('ended', () => {
      updatePageProgress();
      if (continuous && currentIndex < slides.length - 1) {
        setSlide(currentIndex + 1, true);
      } else {
        continuous = false;
        playBtn.textContent = '连续播放';
      }
    });
    pageProgress.addEventListener('input', () => {
      seeking = true;
      const knownDuration = Number.isFinite(audio.duration) ? audio.duration : slideDuration(currentIndex);
      currentTime.textContent = formatTime((Number(pageProgress.value) / 1000) * knownDuration);
    });
    pageProgress.addEventListener('change', () => {
      if (Number.isFinite(audio.duration)) {
        audio.currentTime = (Number(pageProgress.value) / 1000) * audio.duration;
      }
      seeking = false;
      updatePageProgress();
    });
    document.addEventListener('keydown', (event) => {
      if (['INPUT', 'SELECT', 'BUTTON'].includes(event.target.tagName)) return;
      if (event.code === 'Space') {
        event.preventDefault();
        playBtn.click();
      }
      if (event.key === 'ArrowLeft') prevBtn.click();
      if (event.key === 'ArrowRight') nextBtn.click();
    });
    setActiveButtons();
    setSlide(0, false);
  </script>
</body>
</html>
