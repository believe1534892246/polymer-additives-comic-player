      border: 1px solid var(--line);

    .caption {
      position: absolute;
      left: 50%;

      transform: translateX(-50%);

      justify-content: center;

      border-top: 1px solid var(--line);

      backdrop-filter: blur(14px);
      transition: transform 0.18s ease, opacity 0.18s ease, visibility 0.18s ease;
    }
    .panel-toggle {
      position: fixed;
      right: clamp(12px, 2vw, 24px);
      bottom: 142px;
      z-index: 7;
      min-width: 72px;
      min-height: 34px;

      background: #172033;
      color: #fff;

    }
    .panel-toggle:hover { background: #24324a; border-color: #24324a; }
    label { display: grid; gap: 4px; color: var(--muted); font-size: 12px; }
    select {

      background: #fff;
      color: var(--text);
      padding: 0 12px;

    }
    .button-row, .toggle-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

    button {

    button:focus-visible, select:focus-visible, input:focus-visible {

    .progress-head { display: flex; justify-content: space-between; gap: 10px; color: var(--muted); font-size: 12px; }
    input[type="range"] { width: 100%; accent-color: var(--primary); }
    .total-bar { height: 8px; border-radius: 999px; background: #e6ebf3; overflow: hidden; }
    .total-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: width 0.16s ease; }
    audio { display: none; }

      .stage { height: calc(100vh - 170px); min-height: 0; padding: 2px clamp(8px, 1vw, 16px) 8px; }

      .controls {

        gap: 5px 8px;
        padding: 7px clamp(8px, 1.6vw, 16px);
      }
      label { gap: 2px; font-size: 11px; }
      select { min-height: 30px; padding: 0 8px; }
      button { min-width: 58px; min-height: 30px; font-size: 12px; }
      .primary { min-width: 78px; }
      .toggle-row { gap: 5px; padding-top: 0; }
      .progress-block { gap: 3px; }
      .progress-head { font-size: 11px; }
      .total-bar { height: 6px; }
      .panel-toggle { bottom: 116px; min-width: 62px; min-height: 30px; font-size: 12px; }
    }
    body.controls-collapsed {

    }
    body.controls-collapsed .stage {
      height: calc(100vh - 112px);
      min-height: 260px;
    }
    body.controls-collapsed .slide-image {
      width: 90%;
      height: 90%;
    }
    body.controls-collapsed .controls {
      transform: translateY(calc(100% + 10px));
      opacity: 0;
      visibility: hidden;

    }

    }
    @media (orientation: landscape) and (max-height: 720px) {
      body.controls-collapsed { padding-bottom: 42px; }

      body.controls-collapsed .slide-image { width: 90%; height: 90%; }
      body.controls-collapsed .panel-toggle { bottom: 8px; }
    }
  </style>

  <script>
    const slides = [
      {
            "id": "slide001",
            "index": 1,
            "number": "1.1",
            "title": "1.1 助剂在塑料和橡胶加工中的地位",
            "titleEn": "1.1 The Role of Additives in Plastic and Rubber Processing",
            "image": "player_assets/slide001.webp",
            "audio": {
                  "zh": "player_assets/slide001_zh.mp3",
                  "en": "player_assets/slide001_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide001_zh.vtt",
                  "en": "player_assets/slide001_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 26256,
                              "text": "大家好，这幅图说明的是助剂为什么在塑料和橡胶加工中不可缺少。 塑料瓶、管材、轮胎和手套等制品，都要经过配合、塑炼或混炼、成型等步骤。 整个生产过程离不开三项基本要素：聚合物、助剂和加工设备。 助剂虽然用量通常不大，却能明显改善加工条件。"
                        },
                        {
                              "start": 26256,
                              "end": 52152,
                              "text": "没有助剂时，物料可能黏度高、流动困难、能耗大； 合理加入助剂后，流动更顺畅，加工更稳定，效率也更高。 助剂还能让制品更结实、耐冲击、耐热并延长寿命。 增塑剂、稳定剂、阻燃剂、抗静电剂等不同品种，分别赋予材料柔软、稳定、阻燃和抗静电等性能。"
                        },
                        {
                              "start": 52152,
                              "end": 73247,
                              "text": "不同聚合物对助剂的依赖程度不同，热塑性塑料和橡胶往往需要更多品种和更高用量。 橡胶硫化还需要硫化剂、促进剂、活性剂和防焦剂共同配合。 概括来说，助剂与聚合物合理配合，才能得到满足实际用途的改性材料。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 32376,
                              "text": "Hello everyone. This page explains why additives are indispensable in the processing of plastics and rubber. Products such as plastic bottles, pipes, tires, and gloves all go through compounding, plasticating or mixing, and forming. The whole production process depends on three basic elements: polymer, additives, and processing equipment. Although additives are usually used in relatively small amounts, they can greatly improve processing conditions."
                        },
                        {
                              "start": 32376,
                              "end": 59784,
                              "text": "Without additives, the material may have high viscosity, poor flow, high energy consumption, and unstable processing. With a suitable additive system, flow becomes smoother, processing becomes more stable, and efficiency improves. Additives can also make products stronger, more impact resistant, more heat resistant, and longer lasting. Different polymers depend on additives to different degrees."
                        },
                        {
                              "start": 59784,
                              "end": 79703,
                              "text": "Thermoplastics and rubber often need more additive types and higher dosages. Rubber vulcanization also requires vulcanizing agents, accelerators, activators, and scorch retarders to work together. In short, only when additives and polymers are properly matched can we obtain modified materials that meet real application needs."
                        }
                  ]
            },
            "duration": {
                  "zh": 73.247,
                  "en": 79.703
            },
            "alt": "第1张：1.1 助剂在塑料和橡胶加工中的地位"
      },
      {
            "id": "slide002",
            "index": 2,
            "number": "1.2",
            "title": "1.2 助剂的类别和作用",
            "titleEn": "1.2 Categories and Functions of Additives",
            "image": "player_assets/slide002.webp",
            "audio": {
                  "zh": "player_assets/slide002_zh.mp3",
                  "en": "player_assets/slide002_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide002_zh.vtt",
                  "en": "player_assets/slide002_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 24528,
                              "text": "随着塑料和橡胶品种、加工技术与应用领域不断增加，助剂也形成了数量庞大、功能明确的体系。 按照作用来分，首先是稳定化助剂，它们像防护盾一样，减缓光、热、氧、辐射和微生物引起的老化，常见的有抗氧剂、光稳定剂、热稳定剂和防霉剂。"
                        },
                        {
                              "start": 24528,
                              "end": 46367,
                              "text": "第二类用于改善力学性能，例如硫化体系助剂、补强剂、填充剂、偶联剂和抗冲击剂，可提高强度、硬度、刚性、变形能力或冲击强度。 第三类改善加工性能，包括润滑剂、脱模剂、塑解剂和软化剂，使物料更易流动和成型。"
                        },
                        {
                              "start": 46367,
                              "end": 68758,
                              "text": "第四类用于柔软化与轻质化，其中增塑剂让硬质材料变柔软，发泡剂则形成泡孔，制得泡沫塑料、合成木材和海绵橡胶。 此外，还有改善表面性能和外观的润滑剂、抗静电剂、防雾滴剂，以及降低可燃性的阻燃剂和烟雾抑制剂。"
                        },
                        {
                              "start": 68758,
                              "end": 78285,
                              "text": "实际生产中，一种聚合物常需多种助剂协同使用，缺少合理的助剂体系，材料往往难以发挥应有价值。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 29280,
                              "text": "As the varieties of plastics and rubber, processing technologies, and application fields continue to expand, additives have formed a large and function-oriented system. The first group is stabilizing additives. They act like a protective shield and slow down aging caused by light, heat, oxygen, radiation, or microorganisms. Common examples include antioxidants, light stabilizers, heat stabilizers, and mildew inhibitors."
                        },
                        {
                              "start": 29280,
                              "end": 59376,
                              "text": "The second group improves mechanical properties, such as vulcanization additives, reinforcing agents, fillers, coupling agents, and impact modifiers. They improve strength, hardness, rigidity, deformation ability, or impact resistance. The third group improves processing performance, including lubricants, mold release agents, peptizers, and softeners, which help materials flow and form more easily."
                        },
                        {
                              "start": 59376,
                              "end": 85200,
                              "text": "The fourth group is used for softening and lightweighting: plasticizers make rigid materials flexible, while foaming agents create cells in foams, synthetic wood, and sponge rubber. There are also additives that improve surface properties and appearance, such as lubricants, antistatic agents, and antifogging agents, as well as flame retardants and smoke suppressants that reduce combustibility."
                        },
                        {
                              "start": 85200,
                              "end": 96215,
                              "text": "In actual production, one polymer often requires several additives to work together. Without a reasonable additive system, the material cannot show its intended value."
                        }
                  ]
            },
            "duration": {
                  "zh": 78.285,
                  "en": 96.215
            },
            "alt": "第2张：1.2 助剂的类别和作用"
      },
      {
            "id": "slide003",
            "index": 3,
            "number": "1.3",
            "title": "1.3 助剂的应用",
            "titleEn": "1.3 Application of Additives",
            "image": "player_assets/slide003.webp",
            "audio": {
                  "zh": "player_assets/slide003_zh.mp3",
                  "en": "player_assets/slide003_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide003_zh.vtt",
                  "en": "player_assets/slide003_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 25896,
                              "text": "助剂的应用不是简单地“加进去”就可以，而是一项需要综合判断的配方技术。 第一要看助剂与聚合物的配伍性，包括相容性和稳定性。 相容性好，助剂才能长期均匀存在； 相容性差，就可能发生固体喷霜或液体析出，既影响外观，也削弱性能。 第二要关注耐久性。"
                        },
                        {
                              "start": 25896,
                              "end": 56760,
                              "text": "助剂可能因挥发、被介质抽出或向相邻材料迁移而损失。 第三要考虑加工适应性，助剂应能承受加工温度和时间，不易分解、挥发或升华，也不能腐蚀设备和模具。 第四要服从制品用途：食品包装、玩具、电线、汽车部件和医疗用品，对外观、颜色、气味、电性能、耐候性与毒性的要求并不相同。"
                        },
                        {
                              "start": 56760,
                              "end": 77975,
                              "text": "最后还要处理好助剂之间的协同与相抗。 配合得当可以相互增效，选择不当则会彼此削弱，甚至引起化学反应、变色或开裂。 因此，选用助剂要同时把握配伍性、耐久性、加工条件、制品用途以及助剂间相互作用这五个要点。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 27504,
                              "text": "Using additives is not simply a matter of adding them into a formulation. It is a compounding technology that requires comprehensive judgment. The first point is compatibility with the polymer, including both miscibility and stability. If compatibility is good, the additive can remain uniformly and stably in the product. If compatibility is poor, the product may show blooming or liquid exudation, which harms appearance and performance."
                        },
                        {
                              "start": 27504,
                              "end": 51840,
                              "text": "The second point is durability. Additives may be lost through volatilization, extraction by media, or migration into neighboring materials. The third point is processing adaptability. Additives must tolerate processing temperature and time, and should not decompose, volatilize, sublime, or corrode equipment and molds. The fourth point is product use."
                        },
                        {
                              "start": 51840,
                              "end": 79848,
                              "text": "Food packaging, toys, wires, automotive parts, and medical products have different requirements for appearance, color, odor, electrical properties, weatherability, and toxicity. Finally, we must handle synergy and antagonism among additives. Proper matching can enhance performance, while poor matching may weaken effects or even cause chemical reactions, discoloration, or cracking."
                        },
                        {
                              "start": 79848,
                              "end": 91295,
                              "text": "Therefore, additive selection should always consider compatibility, durability, processing conditions, product use, and interactions among additives."
                        }
                  ]
            },
            "duration": {
                  "zh": 77.975,
                  "en": 91.295
            },
            "alt": "第3张：1.3 助剂的应用"
      },
      {
            "id": "slide004",
            "index": 4,
            "number": "1.4",
            "title": "1.4 助剂的发展概况",
            "titleEn": "1.4 Development of the Additive Industry",
            "image": "player_assets/slide004.webp",
            "audio": {
                  "zh": "player_assets/slide004_zh.mp3",
                  "en": "player_assets/slide004_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide004_zh.vtt",
                  "en": "player_assets/slide004_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 27168,
                              "text": "助剂工业与合成材料工业同步发展，是一个相对年轻但十分重要的化工领域。 早期助剂主要服务于橡胶工业，我国助剂生产从解放初期起步，先有少量橡胶防老剂和促进剂，随后逐步形成聚氯乙烯用增塑剂和热稳定剂等产品体系。 自二十世纪七十年代以来，助剂行业出现了几项明显变化。"
                        },
                        {
                              "start": 27168,
                              "end": 52608,
                              "text": "第一，大吨位品种向大型化和集中生产发展，增塑剂与橡胶助剂尤为突出。 第二，产品结构从高毒、低效逐步转向低毒、高效。 第三，阻燃剂和填充剂快速发展。 第四，带有功能性基团的齐聚物进入助剂领域，可以通过增塑、增强或交联等多种方式改性聚合物。"
                        },
                        {
                              "start": 52608,
                              "end": 66671,
                              "text": "例如，低聚物既能在加工时起到增塑和增强作用，也能在高温成型时参与交联。 由此可见，现代助剂正从单一功能转向高效、低毒、复合和反应型方向发展。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 27480,
                              "text": "The additive industry developed along with the synthetic materials industry. It is relatively young, but it is a very important chemical field. Early additives mainly served the rubber industry. In China, additive production began in the early years after liberation, first with small amounts of rubber antioxidants and accelerators, and then gradually expanded into products such as PVC plasticizers and heat stabilizers."
                        },
                        {
                              "start": 27480,
                              "end": 54360,
                              "text": "Since the 1970s, several major changes have appeared in the additive industry. First, large-volume products have moved toward large-scale and centralized production, especially plasticizers and rubber additives. Second, product structure has gradually shifted from highly toxic and low-efficiency varieties to low-toxicity and high-efficiency products. Third, flame retardants and fillers have developed rapidly."
                        },
                        {
                              "start": 54360,
                              "end": 83952,
                              "text": "Fourth, oligomers with functional groups have entered the additive field and can modify polymers through plasticization, reinforcement, or crosslinking. For example, oligomers may provide plasticizing and reinforcing effects during processing, and may also participate in crosslinking during high-temperature forming. Modern additives are therefore moving from single-function products toward efficient, low-toxicity, composite, and reactive systems."
                        }
                  ]
            },
            "duration": {
                  "zh": 66.671,
                  "en": 83.952
            },
            "alt": "第4张：1.4 助剂的发展概况"
      },
      {
            "id": "slide005",
            "index": 5,
            "number": "2.1.1",
            "title": "2.1.1 增塑剂的定义",
            "titleEn": "2.1.1 Definition of Plasticizers",
            "image": "player_assets/slide005.webp",
            "audio": {
                  "zh": "player_assets/slide005_zh.mp3",
                  "en": "player_assets/slide005_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide005_zh.vtt",
                  "en": "player_assets/slide005_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 23640,
                              "text": "什么是增塑剂？ 凡是加入聚合物体系后，能够使体系塑性增加的物质，都可以称为增塑剂。 它的主要作用，是削弱聚合物分子链之间的次价键，也就是范德瓦尔斯力，让原本靠得较紧的分子链更容易运动。 分子链活动能力增强后，聚合物的结晶性通常会降低，塑性随之提高。"
                        },
                        {
                              "start": 23640,
                              "end": 48336,
                              "text": "宏观性能表现为硬度、模量、转化温度和脆化温度下降，而伸长率、曲挠性与柔韧性提高。 图中的对比很直观：未加增塑剂的材料硬而脆，弯曲时容易折断； 加入适量增塑剂后，材料柔软且富有韧性。 因此，增塑剂虽然添加量相对有限，却能显著改变材料的加工和使用性能。"
                        },
                        {
                              "start": 48336,
                              "end": 56304,
                              "text": "理解它的关键，不是把它看成单纯的“软化液”，而是理解它对分子链作用力和运动性的调节。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 26784,
                              "text": "What is a plasticizer? Any substance that increases the plasticity of a polymer system after being added can be called a plasticizer. Its main function is to weaken the secondary bonds between polymer chains, especially van der Waals forces, so that chains that were originally packed closely can move more easily. When chain mobility increases, crystallinity usually decreases and plasticity rises."
                        },
                        {
                              "start": 26784,
                              "end": 51912,
                              "text": "In macroscopic properties, hardness, modulus, transition temperature, and brittle temperature decrease, while elongation, flexing ability, and flexibility increase. The comparison in the picture is direct: a material without plasticizer is hard and brittle, and may break when bent. After an appropriate amount of plasticizer is added, the material becomes softer and tougher."
                        },
                        {
                              "start": 51912,
                              "end": 68975,
                              "text": "Therefore, although the dosage of plasticizer is limited, it can significantly change both processing and service performance. The key is not to regard it simply as a softening liquid, but to understand how it regulates molecular interaction and chain mobility."
                        }
                  ]
            },
            "duration": {
                  "zh": 56.304,
                  "en": 68.975
            },
            "alt": "第5张：2.1.1 增塑剂的定义"
      },
      {
            "id": "slide006",
            "index": 6,
            "number": "2.1.2",
            "title": "2.1.2 增塑剂的分类",
            "titleEn": "2.1.2 Classification of Plasticizers",
            "image": "player_assets/slide006.webp",
            "audio": {
                  "zh": "player_assets/slide006_zh.mp3",
                  "en": "player_assets/slide006_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide006_zh.vtt",
                  "en": "player_assets/slide006_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 26448,
                              "text": "增塑剂可以从相容性、作用方式、性能和化学结构四个角度分类。 按相容性分为主增塑剂与辅助增塑剂。 主增塑剂又叫溶剂型增塑剂，能进入聚合物的非晶区和晶区，可单独使用； 辅助增塑剂主要停留在非晶区，通常要与主增塑剂配合。 按作用方式，可分为内增塑剂和外增塑剂。"
                        },
                        {
                              "start": 26448,
                              "end": 49535,
                              "text": "内增塑通过共聚或引入侧链，使增塑单元成为聚合物分子的一部分，迁移和挥发较少； 外增塑则加入低分子或低熔点化合物，通过溶剂化作用提高塑性，本章重点讨论的就是外增塑剂。 按性能可分为通用、耐寒、耐热等类型；"
                        },
                        {
                              "start": 49535,
                              "end": 70438,
                              "text": "按化学结构又有邻苯二甲酸酯、脂肪族二元酸酯、磷酸酯、环氧化合物、多元醇酯、含氯增塑剂、聚合型增塑剂、苯多酸酯、石油酯和酰胺等。 分类的目的，是帮助我们根据材料和用途选择最合适的增塑剂。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 31272,
                              "text": "Plasticizers can be classified from four viewpoints: compatibility, mode of action, performance, and chemical structure. By compatibility, they are divided into primary plasticizers and secondary plasticizers. Primary plasticizers, also called solvent-type plasticizers, can enter both amorphous and crystalline regions and may be used alone. Secondary plasticizers mainly remain in the amorphous region and are usually used together with primary plasticizers."
                        },
                        {
                              "start": 31272,
                              "end": 57144,
                              "text": "By mode of action, plasticizers can be internal or external. Internal plasticization introduces plasticizing units into the polymer molecule by copolymerization or side-chain design, so migration and volatilization are limited. External plasticization adds low-molecular or low-melting compounds and improves plasticity through solvation. This chapter mainly discusses external plasticizers."
                        },
                        {
                              "start": 57144,
                              "end": 85224,
                              "text": "By performance, plasticizers may be general-purpose, cold-resistant, heat-resistant, and so on. By chemical structure, common types include phthalates, aliphatic dibasic acid esters, phosphates, epoxy compounds, polyol esters, chlorinated plasticizers, polymeric plasticizers, trimellitates, petroleum esters, and amides. Classification helps us choose the most suitable plasticizer for a material and application."
                        }
                  ]
            },
            "duration": {
                  "zh": 70.438,
                  "en": 85.224
            },
            "alt": "第6张：2.1.2 增塑剂的分类"
      },
      {
            "id": "slide007",
            "index": 7,
            "number": "2.1.3",
            "title": "2.1.3 增塑剂的性能",
            "titleEn": "2.1.3 Properties of Plasticizers",
            "image": "player_assets/slide007.webp",
            "audio": {
                  "zh": "player_assets/slide007_zh.mp3",
                  "en": "player_assets/slide007_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide007_zh.vtt",
                  "en": "player_assets/slide007_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 25776,
                              "text": "评价增塑剂，首先看相容性。 只有与树脂相容良好，增塑剂才能均匀、稳定地存在于制品中； 相容性差会导致浑浊、析出和表面缺陷。 其次看耐久性，包括低挥发、低抽出和低迁移，防止增塑剂在加工、接触介质或长期使用中逐渐损失。 增塑剂还要适应加工条件。"
                        },
                        {
                              "start": 25776,
                              "end": 54672,
                              "text": "理想产品应降低熔体黏度、缩短塑化时间，在加工温度下不分解、不挥发，也不腐蚀设备和模具。 加入后通常可提高柔韧性、抗冲击性、低温性能和部分电性能，但过量使用也可能造成强度、硬度和耐热性下降。 对于食品包装、药品、玩具和医疗器械等接触型制品，低毒和安全性尤其重要。"
                        },
                        {
                              "start": 54672,
                              "end": 67247,
                              "text": "选型时还要平衡经济性。 以PVC为例，增塑剂不足时制品硬、脆、易开裂； 用量适宜时则柔软、耐弯曲、易加工且寿命更长。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 29976,
                              "text": "When evaluating a plasticizer, the first consideration is compatibility. Only when it is compatible with the resin can it remain uniformly and stably in the product. Poor compatibility may cause turbidity, exudation, and surface defects. The second consideration is durability, including low volatility, low extraction, and low migration, so that the plasticizer is not gradually lost during processing, contact with media, or long-term use."
                        },
                        {
                              "start": 29976,
                              "end": 59856,
                              "text": "Plasticizers must also suit processing conditions. An ideal product should reduce melt viscosity, shorten plasticating time, and avoid decomposition, volatilization, or corrosion at processing temperature. After addition, flexibility, impact resistance, low-temperature performance, and some electrical properties usually improve. Excessive dosage, however, may reduce strength, hardness, and heat resistance."
                        },
                        {
                              "start": 59856,
                              "end": 86520,
                              "text": "For food packaging, medicines, toys, and medical devices, low toxicity and safety are especially important. Selection must also consider economy. In PVC, insufficient plasticizer makes products hard, brittle, and easy to crack. Proper dosage gives soft PVC good flexibility, bend resistance, processability, and longer service life."
                        }
                  ]
            },
            "duration": {
                  "zh": 67.247,
                  "en": 86.52
            },
            "alt": "第7张：2.1.3 增塑剂的性能"
      },
      {
            "id": "slide008",
            "index": 8,
            "number": "2.2",
            "title": "2.2 增塑机理（绪论知识回顾）",
            "titleEn": "2.2 Plasticization Mechanism: Review of the Introduction",
            "image": "player_assets/slide008.webp",
            "audio": {
                  "zh": "player_assets/slide008_zh.mp3",
                  "en": "player_assets/slide008_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide008_zh.vtt",
                  "en": "player_assets/slide008_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 23279,
                              "text": "这幅图适合作为进入增塑剂章节前的复习。 高分子材料广泛用于衣、食、住、行和日常用品，但也可能存在脆性、耐热性差和加工流动性不足等问题，因此需要助剂改善使用与加工性能。 塑料和橡胶加工离不开聚合物、助剂与设备三项要素。"
                        },
                        {
                              "start": 23279,
                              "end": 45718,
                              "text": "助剂按功能可分为稳定化、改善力学性能、改善加工性能、柔软轻质化、改善表面外观以及难燃化等类别。 实际选用时，要考察与聚合物的配伍性、助剂耐久性、加工条件适应性、制品用途限制，以及多种助剂之间的协同或相抗。"
                        },
                        {
                              "start": 45718,
                              "end": 71398,
                              "text": "从行业发展看，助剂正在向大吨位集中生产、低毒高效、阻燃填充快速发展以及反应型齐聚物多功能化等方向演进。 接下来学习增塑剂，就是把这些通用原则落实到一种重要的柔软化助剂上。 核心提示： 先掌握助剂的一般功能和选用原则，才能正确理解增塑剂的机理与应用。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 30936,
                              "text": "This page is suitable as a review before entering the plasticizer chapter. Polymer materials are widely used in clothing, food, housing, transportation, and daily products. However, they may also suffer from brittleness, poor heat resistance, and insufficient processing flow. Additives are therefore needed to improve both service and processing performance. Plastic and rubber processing depends on three elements: polymer, additives, and equipment."
                        },
                        {
                              "start": 30936,
                              "end": 59016,
                              "text": "According to function, additives include stabilizers, mechanical property modifiers, processing aids, softening and lightweighting agents, surface and appearance modifiers, and flame retardants. In actual selection, we must consider compatibility with the polymer, durability of the additive, adaptability to processing conditions, restrictions from product use, and synergy or antagonism among multiple additives."
                        },
                        {
                              "start": 59016,
                              "end": 80951,
                              "text": "From the viewpoint of industry development, additives are moving toward large-scale centralized production, low toxicity and high efficiency, rapid growth of flame retardants and fillers, and multifunctional reactive oligomers. The next topic, plasticizers, applies these general principles to an important class of softening additives."
                        },
                        {
                              "start": 80951,
                              "end": 92062,
                              "text": "Key point: first understand the general functions and selection principles of additives, and then the mechanism and application of plasticizers will be easier to understand."
                        }
                  ]
            },
            "duration": {
                  "zh": 71.398,
                  "en": 92.062
            },
            "alt": "第8张：2.2 增塑机理（绪论知识回顾）"
      },
      {
            "id": "slide009",
            "index": 9,
            "number": "2.3",
            "title": "绪论至2.3增塑剂种类回顾",
            "titleEn": "2.3 Review from the Introduction to Plasticizer Types",
            "image": "player_assets/slide009.webp",
            "audio": {
                  "zh": "player_assets/slide009_zh.mp3",
                  "en": "player_assets/slide009_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide009_zh.vtt",
                  "en": "player_assets/slide009_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 26280,
                              "text": "这幅图用九个画格串联了绪论和增塑剂前半部分。 高分子材料用途广泛，但常有脆、耐热差或加工困难等缺点，需要加入用量不大却作用关键的助剂。 聚合物、助剂和加工设备缺一不可，助剂可承担稳定、增强、助加工、增塑发泡、改善表面和阻燃等不同任务。"
                        },
                        {
                              "start": 26280,
                              "end": 54672,
                              "text": "选用助剂时，要关注配伍性、耐久性、加工适应性、制品用途及助剂之间的相互作用。 行业则朝着规模化、低毒高效和多功能反应型方向发展。 进入增塑剂部分后，我们看到增塑剂通过削弱分子间作用力，提高链段运动性，使硬度、模量和转变温度下降，使伸长率、曲挠性和柔韧性提高。"
                        },
                        {
                              "start": 54672,
                              "end": 71159,
                              "text": "按相容性，增塑剂可分为主增塑剂和辅助增塑剂。 主增塑剂相容性好，可进入非晶区和晶区； 辅助增塑剂相容性较弱，主要分布在非晶区，通常与主增塑剂配合。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 22463,
                              "text": "This page connects the introduction and the first half of the plasticizer chapter through nine panels. Polymer materials have broad applications, but they often have weaknesses such as brittleness, poor heat resistance, or difficult processing. Additives are used in small amounts but play key roles. Polymer, additive, and processing equipment are all indispensable."
                        },
                        {
                              "start": 22463,
                              "end": 51791,
                              "text": "Additives may provide stabilization, reinforcement, processing assistance, plasticization, foaming, surface improvement, and flame retardancy. When selecting additives, we need to consider compatibility, durability, processing adaptability, product use, and interactions among additives. The industry is developing toward scale, low toxicity, high efficiency, and multifunctional reactive products."
                        },
                        {
                              "start": 51791,
                              "end": 79511,
                              "text": "In the plasticizer section, we learn that plasticizers weaken intermolecular forces and increase segmental mobility, so hardness, modulus, and transition temperature decrease, while elongation, flexing ability, and flexibility increase. By compatibility, plasticizers are divided into primary and secondary plasticizers. Primary plasticizers have good compatibility and can enter both amorphous and crystalline regions."
                        },
                        {
                              "start": 79511,
                              "end": 89182,
                              "text": "Secondary plasticizers have weaker compatibility, mainly stay in amorphous regions, and are usually used together with primary plasticizers."
                        }
                  ]
            },
            "duration": {
                  "zh": 71.159,
                  "en": 89.182
            },
            "alt": "第9张：绪论至2.3增塑剂种类回顾"
      },
      {
            "id": "slide010",
            "index": 10,
            "number": "2.4",
            "title": "2.4 增塑剂的应用",
            "titleEn": "2.4 Application of Plasticizers",
            "image": "player_assets/slide010.webp",
            "audio": {
                  "zh": "player_assets/slide010_zh.mp3",
                  "en": "player_assets/slide010_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide010_zh.vtt",
                  "en": "player_assets/slide010_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 22487,
                              "text": "这幅图先回顾助剂在塑料和橡胶加工中的地位，再集中说明增塑剂的应用。 增塑剂加入聚合物后，削弱分子链间的次价键，提高链段运动性，使材料更柔软、更有弹性，同时降低硬度、玻璃化转变温度和脆化温度，改善低温性能与成型加工性。"
                        },
                        {
                              "start": 22487,
                              "end": 52895,
                              "text": "增塑剂按相容性可分为主增塑剂和辅助增塑剂，按化学结构可分为酯类、醚类、酮类、烃类、磷酸酯类及其他类型。 实际应用最广的是PVC，此外还用于电线电缆、人造革、地板革、薄膜片材、软管、玩具、密封件和部分医用制品。 以PVC管为例，未增塑的硬质PVC硬度高、脆性大、加工困难；"
                        },
                        {
                              "start": 52895,
                              "end": 67486,
                              "text": "加入适量增塑剂后可得到柔软、耐弯曲、低温不易脆化且寿命更长的软质PVC。 应用时必须结合用途选择品种和用量，避免迁移、析出或性能下降。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 28464,
                              "text": "This page first reviews the role of additives in plastic and rubber processing, and then focuses on plasticizer applications. After a plasticizer is added to a polymer, it weakens secondary bonds between chains, increases chain mobility, makes the material softer and more elastic, and lowers hardness, glass transition temperature, and brittle temperature. As a result, low-temperature performance and forming processability are improved."
                        },
                        {
                              "start": 28464,
                              "end": 61296,
                              "text": "By compatibility, plasticizers are divided into primary and secondary plasticizers. By chemical structure, they include esters, ethers, ketones, hydrocarbons, phosphates, and other types. The most important application is PVC. They are also used in wires and cables, artificial leather, floor covering, films and sheets, hoses, toys, seals, and some medical products. Take PVC pipe as an example."
                        },
                        {
                              "start": 61296,
                              "end": 86184,
                              "text": "Unplasticized rigid PVC has high hardness, high brittleness, and difficult processing. After a proper amount of plasticizer is added, soft PVC becomes flexible, bend resistant, less brittle at low temperature, and longer lasting. In application, both type and dosage must be selected according to product use to avoid migration, exudation, or property loss."
                        }
                  ]
            },
            "duration": {
                  "zh": 67.486,
                  "en": 86.184
            },

      },
      {
            "id": "slide011",
            "index": 11,
            "number": "2.5",
            "title": "2.5 邻苯二甲酸的生产工艺",
            "titleEn": "2.5 Production Process of Phthalic Acid",
            "image": "player_assets/slide011.webp",
            "audio": {
                  "zh": "player_assets/slide011_zh.mp3",
                  "en": "player_assets/slide011_en.mp3"

            "subtitle": {
                  "zh": "player_assets/slide011_zh.vtt",
                  "en": "player_assets/slide011_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 25776,
                              "text": "这幅图以前八格回顾绪论和增塑剂基础，最后一格介绍邻苯二甲酸的生产工艺。 高分子材料虽然用途广泛，但要改善加工条件、延长寿命或获得特殊功能，通常需要助剂。 增塑剂就是其中的重要一类，它通过削弱分子间作用力提高塑性，并可分为主增塑剂和辅助增塑剂。"
                        },
                        {
                              "start": 25776,
                              "end": 46511,
                              "text": "最后一格给出了邻苯二甲酸的主要工业路线。 原料邻二甲苯先经过气相空气氧化，生成邻苯二甲酸酐； 再经水解得到邻苯二甲酸，也就是图中标注的PA。 该路线原料易得、工艺成熟、产品纯度高，是工业生产邻苯二甲酸的主要方法。"
                        },
                        {
                              "start": 46511,
                              "end": 61966,
                              "text": "需要注意，图片标题写的是邻苯二甲酸，而增塑剂工业中常见的许多产品是邻苯二甲酸酯。 邻苯二甲酸及其酸酐是进一步酯化制备相关增塑剂的重要中间体。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 24576,
                              "text": "This page reviews the introduction and plasticizer basics in the first eight panels, and then introduces the production process of phthalic acid in the last panel. Although polymer materials are widely used, additives are usually needed to improve processing, extend service life, or provide special functions. Plasticizers are one important class of additives."
                        },
                        {
                              "start": 24576,
                              "end": 49680,
                              "text": "They increase plasticity by weakening intermolecular forces and may be divided into primary and secondary plasticizers. The last panel shows the main industrial route for phthalic acid. The raw material o-xylene is first oxidized by air in the gas phase to form phthalic anhydride. Phthalic anhydride is then hydrolyzed to produce phthalic acid, shown in the picture as PA."
                        },
                        {
                              "start": 49680,
                              "end": 74184,
                              "text": "This route uses available raw materials, has mature technology, and can produce high-purity product, so it is a major industrial route. It should be noted that the picture title is phthalic acid, while many common products in the plasticizer industry are phthalate esters. Phthalic acid and its anhydride are important intermediates for further esterification into related plasticizers."
                        }
                  ]
            },
            "duration": {
                  "zh": 61.966,
                  "en": 74.184
            },
            "alt": "第11张：2.5 邻苯二甲酸的生产工艺"
      },
      {
            "id": "slide012",
            "index": 12,
            "number": "3.1",
            "title": "3.1 抗氧剂概述",
            "titleEn": "3.1 Overview of Antioxidants",
            "image": "player_assets/slide012.webp",
            "audio": {
                  "zh": "player_assets/slide012_zh.mp3",
                  "en": "player_assets/slide012_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide012_zh.vtt",
                  "en": "player_assets/slide012_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 26040,
                              "text": "高分子材料在成型、储存和使用过程中会逐渐失去性能，这种不可逆变化叫老化。 生活中常见的农膜变脆、电线绝缘层开裂和轮胎龟裂，都是老化的表现。 除了表面变暗、变色、发黏、变形、裂纹和粉化，材料的溶解性、熔融指数、玻璃化温度、强度及电性能也会发生变化。"
                        },
                        {
                              "start": 26040,
                              "end": 52176,
                              "text": "老化原因包括光、热、应力和辐射等物理因素，氧、臭氧、重金属离子和化学介质等化学因素，也包括微生物、昆虫以及材料结构、助剂种类和加工方法等内在因素。 其中光、氧和热最关键，它们会引发聚合物的自动氧化。 氧化降解往往比纯热降解在更低温度下发生。"
                        },
                        {
                              "start": 52176,
                              "end": 69695,
                              "text": "抗氧剂能够抑制或延缓自动氧化反应，因此也被称为材料的“防老剂”。 它广泛用于塑料、橡胶、油脂、石油和食品工业。 理想抗氧剂应高效、相容、耐久、低污染、无毒且价格合理。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 18095,
                              "text": "Polymer materials gradually lose performance during forming, storage, and use. This irreversible change is called aging. Common examples include agricultural film becoming brittle, insulation layers on wires cracking, and tires developing surface cracks."
                        },
                        {
                              "start": 18095,
                              "end": 46679,
                              "text": "In addition to darkening, discoloration, tackiness, deformation, cracking, and powdering, properties such as solubility, melt index, glass transition temperature, strength, and electrical performance may also change. Aging is caused by physical factors such as light, heat, stress, and radiation; chemical factors such as oxygen, ozone, heavy metal ions, and chemical media;"
                        },
                        {
                              "start": 46679,
                              "end": 73823,
                              "text": "and internal factors such as microorganisms, insects, material structure, additive type, and processing method. Among these, light, oxygen, and heat are the most important because they initiate polymer auto-oxidation. Oxidative degradation often occurs at lower temperature than pure thermal degradation. Antioxidants can inhibit or delay auto-oxidation, so they are also called anti-aging agents."
                        },
                        {
                              "start": 73823,
                              "end": 89518,
                              "text": "They are widely used in plastics, rubber, oils, petroleum products, and the food industry. An ideal antioxidant should be efficient, compatible, durable, low-polluting, non-toxic, and reasonably priced."
                        }
                  ]
            },
            "duration": {
                  "zh": 69.695,
                  "en": 89.518
            },
            "alt": "第12张：3.1 抗氧剂概述"
      },
      {
            "id": "slide013",
            "index": 13,
            "number": "3.2",
            "title": "3.2 聚合物的氧化和抗氧化机理",
            "titleEn": "3.2 Polymer Oxidation and Antioxidant Mechanisms",
            "image": "player_assets/slide013.webp",
            "audio": {
                  "zh": "player_assets/slide013_zh.mp3",
                  "en": "player_assets/slide013_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide013_zh.vtt",
                  "en": "player_assets/slide013_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 27360,
                              "text": "聚合物在热、光、氧和应力作用下容易发生自动氧化。 第一步是氧化起始：分子链上的弱键断裂，生成聚合物自由基R自由基。 它迅速与氧结合形成过氧自由基ROO自由基，随后从另一条分子链夺取氢，生成氢过氧化物ROOH和新的自由基，链反应因此不断传播。"
                        },
                        {
                              "start": 27360,
                              "end": 53496,
                              "text": "ROOH并不稳定，在热作用下还会分解成烷氧自由基和羟基自由基，引起链分支，使反应进一步加速。 最终结果可能是分子链断裂或交联，表现为变脆、开裂、变色、粉化和力学性能下降。 主抗氧剂主要通过提供活泼氢来终止自由基链反应，常见的有受阻酚和芳香胺；"
                        },
                        {
                              "start": 53496,
                              "end": 71183,
                              "text": "辅助抗氧剂则分解ROOH，把危险的过氧化物转化为较稳定产物，常见的有亚磷酸酯和硫代酯。 主、辅抗氧剂复配，可以同时抑制自由基并清除ROOH，形成更完整的协同保护。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 29856,
                              "text": "Under heat, light, oxygen, and stress, polymers can undergo auto-oxidation. The first step is initiation: weak bonds on the molecular chain break to form polymer radicals. These radicals quickly react with oxygen to form peroxy radicals. The peroxy radicals then abstract hydrogen from another chain, producing hydroperoxide, ROOH, and new radicals. In this way, the chain reaction continues. ROOH is unstable."
                        },
                        {
                              "start": 29856,
                              "end": 58128,
                              "text": "Under heat, it decomposes into alkoxy radicals and hydroxyl radicals, causing chain branching and further accelerating the reaction. The final result may be chain scission or crosslinking, expressed as brittleness, cracking, discoloration, powdering, and loss of mechanical properties. Primary antioxidants mainly donate active hydrogen to terminate radical chain reactions. Hindered phenols and aromatic amines are common examples."
                        },
                        {
                              "start": 58128,
                              "end": 78263,
                              "text": "Secondary antioxidants decompose ROOH and convert dangerous peroxides into more stable products. Phosphites and thioesters are common examples. When primary and secondary antioxidants are combined, they can suppress radicals and remove ROOH at the same time, forming a more complete synergistic protection system."
                        }
                  ]
            },
            "duration": {
                  "zh": 71.183,
                  "en": 78.263
            },
            "alt": "第13张：3.2 聚合物的氧化和抗氧化机理"
      },
      {
            "id": "slide014",
            "index": 14,
            "number": "3.3",
            "title": "3.3 抗氧剂的种类",
            "titleEn": "3.3 Types of Antioxidants",
            "image": "player_assets/slide014.webp",
            "audio": {
                  "zh": "player_assets/slide014_zh.mp3",
                  "en": "player_assets/slide014_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide014_zh.vtt",
                  "en": "player_assets/slide014_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 19415,
                              "text": "抗氧剂可以按照化学结构和作用机理来认识。 受阻酚类以2,6-二叔丁基对甲酚类结构为基础，能够提供活泼氢，是重要的一次抗氧剂。 芳香胺类同样属于一次抗氧剂，终止自由基链反应的能力较强。"
                        },
                        {
                              "start": 19415,
                              "end": 39718,
                              "text": "亚磷酸酯类和硫代酯类主要作为二次抗氧剂，它们的任务是分解ROOH，阻止氢过氧化物继续生成高活性自由基。 把受阻酚、亚磷酸酯和硫代酯等按合理比例复配，可以产生协同效应，提高抗氧化效率并减少单剂用量。"
                        },
                        {
                              "start": 39718,
                              "end": 61485,
                              "text": "天然抗氧剂来自植物等天然产物，例如生育酚，也就是维生素E，以及迷迭香提取物和茶多酚。 其他类型还包括金属减活剂、过氧化物分解剂、吸氧剂和紫外线吸收剂。 不同品种各有特点，应根据聚合物、加工温度和使用环境选择或复配。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 25224,
                              "text": "Antioxidants can be understood by chemical structure and mechanism. Hindered phenols are based on structures such as 2,6-di-tert-butyl phenols. They provide active hydrogen and are important primary antioxidants. Aromatic amines are also primary antioxidants and have strong ability to terminate radical chain reactions. Phosphites and thioesters are mainly secondary antioxidants."
                        },
                        {
                              "start": 25224,
                              "end": 56880,
                              "text": "Their task is to decompose ROOH and prevent hydroperoxides from producing highly active radicals. When hindered phenols, phosphites, and thioesters are mixed in a suitable ratio, they produce synergy, improve antioxidant efficiency, and reduce the dosage of individual additives. Natural antioxidants come from plants and other natural products, such as tocopherol, also known as vitamin E, as well as rosemary extract and tea polyphenols."
                        },
                        {
                              "start": 56880,
                              "end": 72623,
                              "text": "Other types include metal deactivators, peroxide decomposers, oxygen absorbers, and ultraviolet absorbers. Each type has its own features and should be selected or combined according to polymer type, processing temperature, and service environment."
                        }
                  ]
            },
            "duration": {
                  "zh": 61.485,
                  "en": 72.623
            },
            "alt": "第14张：3.3 抗氧剂的种类"
      },
      {
            "id": "slide015",
            "index": 15,
            "number": "3.4",
            "title": "3.4 抗氧剂的选择及应用",
            "titleEn": "3.4 Selection and Application of Antioxidants",
            "image": "player_assets/slide015.webp",
            "audio": {
                  "zh": "player_assets/slide015_zh.mp3",
                  "en": "player_assets/slide015_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide015_zh.vtt",
                  "en": "player_assets/slide015_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 23592,
                              "text": "选择抗氧剂要综合考虑聚合物种类、加工条件、使用环境、性能要求、经济性和安全性。 理想抗氧剂应与材料相容，不析出、不喷霜； 抗氧效率高且持久； 耐热、低挥发、低抽出，同时毒性低、变色小、价格合理。 不同聚合物的结构和降解机理不同。"
                        },
                        {
                              "start": 23592,
                              "end": 48456,
                              "text": "PE、PP等聚烯烃常选受阻酚，必要时与亚磷酸酯并用； PVC除受阻酚外，通常还需要亚磷酸酯等辅助抗氧剂。 两种或多种抗氧剂复配，可以协同增效。 用量不足，保护效果不明显； 用量过多则增加成本，也可能影响材料性能，因此要通过试验确定最佳值。"
                        },
                        {
                              "start": 48456,
                              "end": 72144,
                              "text": "添加时应与树脂及其他助剂充分混匀，并避免过高温度造成抗氧剂提前分解。 储存中要防潮、避免长期高温，并定期观察老化情况。 例如PP注塑筐中，抗氧剂1010与亚磷酸酯168合理搭配，可明显提高热稳定性和长期使用寿命。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 29136,
                              "text": "Selecting antioxidants requires considering polymer type, processing conditions, service environment, performance requirements, economy, and safety. An ideal antioxidant should be compatible with the material, without exudation or blooming. It should have high and lasting antioxidant efficiency, heat resistance, low volatility, low extractability, low toxicity, little discoloration, and reasonable cost."
                        },
                        {
                              "start": 29136,
                              "end": 52584,
                              "text": "Different polymers have different structures and degradation mechanisms. Polyolefins such as PE and PP often use hindered phenols, sometimes together with phosphites. PVC often needs phosphites and other secondary antioxidants in addition to hindered phenols. Combining two or more antioxidants may create synergy. Too little dosage gives weak protection;"
                        },
                        {
                              "start": 52584,
                              "end": 78024,
                              "text": "too much increases cost and may affect material properties, so the optimum amount must be determined by tests. During addition, antioxidants should be fully mixed with resin and other additives, while excessively high temperature should be avoided because it may decompose the antioxidant too early. During storage, moisture and long-term high temperature should be avoided, and aging should be monitored."
                        },
                        {
                              "start": 78024,
                              "end": 90551,
                              "text": "For example, in PP injection-molded baskets, a proper combination of antioxidant 1010 and phosphite 168 can significantly improve heat stability and long-term service life."
                        }
                  ]
            },
            "duration": {
                  "zh": 72.144,
                  "en": 90.551
            },
            "alt": "第15张：3.4 抗氧剂的选择及应用"
      },
      {
            "id": "slide016",
            "index": 16,
            "number": "3.5",
            "title": "3.5 抗氧剂市场现状及发展趋势",
            "titleEn": "3.5 Market Status and Trends of Antioxidants",
            "image": "player_assets/slide016.webp",
            "audio": {
                  "zh": "player_assets/slide016_zh.mp3",
                  "en": "player_assets/slide016_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide016_zh.vtt",
                  "en": "player_assets/slide016_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 24840,
                              "text": "随着塑料、橡胶、合成纤维、涂料和润滑油等产业增长，抗氧剂需求持续上升。 全球生产与消费主要集中在亚洲、欧洲和北美，其中亚洲产能增长较快。 与此同时，环保法规和高性能应用正在推动产品结构由低效、高毒的传统品种转向高效、低毒和环境友好型产品。"
                        },
                        {
                              "start": 24840,
                              "end": 53688,
                              "text": "未来首先强调高效化，通过受阻酚、亚磷酸酯、硫代酯等复配实现协同增效和长效保护。 第二是环保化，发展生物基、无卤、低挥发和低毒抗氧剂。 第三是专用化，针对高温材料、透明制品、食品接触材料等场景开发专用品种。 第四是复合化与多功能化，把抗氧、耐候和抗光等功能组合起来。"
                        },
                        {
                              "start": 53688,
                              "end": 66431,
                              "text": "行业也会进一步集中，通过工艺优化和产业链协同提高竞争力。 总体来看，抗氧剂将沿着高性能、绿色化、功能化和定制化方向发展。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 17831,
                              "text": "With the growth of plastics, rubber, synthetic fibers, coatings, and lubricating oils, demand for antioxidants continues to rise. Global production and consumption are mainly concentrated in Asia, Europe, and North America, with Asian capacity growing quickly."
                        },
                        {
                              "start": 17831,
                              "end": 42167,
                              "text": "At the same time, environmental regulations and high-performance applications are pushing products from traditional low-efficiency and high-toxicity types toward efficient, low-toxicity, and environmentally friendly varieties. Future development first emphasizes efficiency. Hindered phenols, phosphites, and thioesters will be combined to achieve synergy and long-term protection."
                        },
                        {
                              "start": 42167,
                              "end": 72527,
                              "text": "The second direction is environmental friendliness, including bio-based, halogen-free, low-volatility, and low-toxicity antioxidants. The third direction is specialization, with dedicated products for high-temperature materials, transparent products, food-contact materials, and other scenarios. The fourth direction is compounding and multifunctionality, combining antioxidant, weathering, and light-stabilizing functions."
                        },
                        {
                              "start": 72527,
                              "end": 88486,
                              "text": "The industry will also become more concentrated, and competitiveness will improve through process optimization and supply-chain coordination. Overall, antioxidants will develop toward high performance, green chemistry, functionality, and customization."
                        }
                  ]
            },
            "duration": {
                  "zh": 66.431,
                  "en": 88.486
            },
            "alt": "第16张：3.5 抗氧剂市场现状及发展趋势"
      },
      {
            "id": "slide017",
            "index": 17,
            "number": "4.1",
            "title": "4.1 热稳定剂概述",
            "titleEn": "4.1 Overview of Heat Stabilizers",
            "image": "player_assets/slide017.webp",
            "audio": {
                  "zh": "player_assets/slide017_zh.mp3",
                  "en": "player_assets/slide017_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide017_zh.vtt",
                  "en": "player_assets/slide017_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 27696,
                              "text": "热稳定剂是PVC加工和使用过程中不可缺少的重要助剂。 PVC受热时容易降解并脱出氯化氢，随后出现变色、发脆和力学性能下降，严重时会完全失去使用价值。 因此，热稳定剂的任务是捕获或中和HCl，抑制降解继续进行。 它的主要机理包括：吸收脱出的HCl，消除其催化作用；"
                        },
                        {
                              "start": 27696,
                              "end": 53472,
                              "text": "取代PVC链上不稳定的氯原子，从源头减少脱HCl； 与共轭多烯结构或不稳定中间体反应，阻断变色和降解链； 络合金属离子，抑制氧化降解。 理想热稳定剂应具备高效、长期稳定、加工性好、低毒环保和经济等性能。 按组成可分为铅盐类、金属皂类和有机锡类等。"
                        },
                        {
                              "start": 53472,
                              "end": 62087,
                              "text": "实际选用要结合PVC树脂、加工工艺、制品用途与成本，常采用复配方式获得最佳效果。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 27096,
                              "text": "Heat stabilizers are essential additives in the processing and use of PVC. When PVC is heated, it easily degrades and releases hydrogen chloride. This leads to discoloration, brittleness, and reduced mechanical properties. In severe cases, the material may completely lose its service value. The task of heat stabilizers is to capture or neutralize HCl and inhibit further degradation."
                        },
                        {
                              "start": 27096,
                              "end": 51984,
                              "text": "Their main mechanisms include absorbing the released HCl and eliminating its catalytic effect; replacing unstable chlorine atoms on the PVC chain and reducing dehydrochlorination from the source; reacting with conjugated polyene structures or unstable intermediates to block discoloration and degradation chains; and complexing metal ions to suppress oxidative degradation."
                        },
                        {
                              "start": 51984,
                              "end": 79104,
                              "text": "An ideal heat stabilizer should be efficient, long-lasting, easy to process, low-toxic, environmentally friendly, and economical. By composition, common types include lead salts, metal soaps, and organotin compounds. In actual selection, PVC resin, processing method, product use, and cost must all be considered. Compound systems are often used to obtain the best result."
                        }
                  ]
            },
            "duration": {
                  "zh": 62.087,
                  "en": 79.104
            },
            "alt": "第17张：4.1 热稳定剂概述"
      },
      {
            "id": "slide018",
            "index": 18,
            "number": "4.2",
            "title": "4.2 PVC的降解及热稳定剂作用机理",
            "titleEn": "4.2 PVC Degradation and Heat Stabilization Mechanisms",
            "image": "player_assets/slide018.webp",
            "audio": {
                  "zh": "player_assets/slide018_zh.mp3",
                  "en": "player_assets/slide018_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide018_zh.vtt",
                  "en": "player_assets/slide018_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 30480,
                              "text": "PVC在热、光、氧和机械作用下会发生降解。 它的碳氯键相对较弱，受热后容易脱去HCl，链上形成共轭双键。 HCl又会催化更多PVC继续脱HCl，形成“自催化”效应，使制品迅速变色、发脆和性能下降。 温度、紫外线、氧和机械剪切都会加快这一过程。 热稳定剂主要通过四条路径保护PVC。"
                        },
                        {
                              "start": 30480,
                              "end": 62376,
                              "text": "第一，碱性稳定剂与HCl反应，中和并吸收它，切断自催化。 第二，羧酸盐、硫醇盐等活性基团取代不稳定氯原子，从源头阻止脱HCl。 第三，环氧化合物或亚磷酸酯与共轭多烯结构加成，阻断多烯增长。 第四，螯合剂络合铁、铜等金属离子，降低其氧化催化活性。 这些机理通常不是彼此孤立的。"
                        },
                        {
                              "start": 62376,
                              "end": 72671,
                              "text": "高效体系往往通过吸酸、取代、加成和络合协同作用，使PVC在加工和使用中保持较好的颜色、力学性能与外观。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 27192,
                              "text": "PVC degrades under heat, light, oxygen, and mechanical action. Its carbon-chlorine bond is relatively weak. When heated, PVC easily eliminates HCl and forms conjugated double bonds on the chain. The released HCl then catalyzes further dehydrochlorination, creating an autocatalytic effect. As a result, the product quickly discolors, becomes brittle, and loses performance."
                        },
                        {
                              "start": 27192,
                              "end": 56712,
                              "text": "Temperature, ultraviolet light, oxygen, and mechanical shear all accelerate this process. Heat stabilizers protect PVC through four main pathways. First, basic stabilizers react with HCl, neutralizing and absorbing it to cut off autocatalysis. Second, active groups such as carboxylates and thiolates replace unstable chlorine atoms and prevent HCl release from the source."
                        },
                        {
                              "start": 56712,
                              "end": 89808,
                              "text": "Third, epoxy compounds or phosphites add to conjugated polyene structures and stop polyene growth. Fourth, chelating agents complex metal ions such as iron and copper and reduce their oxidative catalytic activity. These mechanisms are usually not isolated. Efficient systems often combine acid absorption, substitution, addition, and complexation, helping PVC maintain color, mechanical properties, and appearance during processing and use."
                        }
                  ]
            },
            "duration": {
                  "zh": 72.671,
                  "en": 89.808
            },
            "alt": "第18张：4.2 PVC的降解及热稳定剂作用机理"
      },
      {
            "id": "slide019",
            "index": 19,
            "number": "4.3",
            "title": "4.3 热稳定剂的性能",
            "titleEn": "4.3 Properties of Heat Stabilizers",
            "image": "player_assets/slide019.webp",
            "audio": {
                  "zh": "player_assets/slide019_zh.mp3",
                  "en": "player_assets/slide019_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide019_zh.vtt",
                  "en": "player_assets/slide019_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 28008,
                              "text": "评价热稳定剂，最基本的指标是热稳定性。 它应在PVC常见的160至200摄氏度加工范围内不分解、不挥发，并能在较长加工时间内持续保护。 制品成型后还要有良好的长期稳定性，在储存和使用数月或数年后仍保持性能。 理想热稳定剂应使PVC初期着色小，保持浅色和透明；"
                        },
                        {
                              "start": 28008,
                              "end": 51432,
                              "text": "还要抑制后期连续着色，减少长期使用中的黄变。 它本身不能明显增加熔体黏度或影响挤出、压延等工序，并要与PVC相容良好，避免析出、喷霜和表面粗糙。 对于电线电缆等制品，还要尽量减小对绝缘电阻、介电强度和介电常数的影响。"
                        },
                        {
                              "start": 51432,
                              "end": 64247,
                              "text": "低挥发、低抽出、低迁移可以降低环境影响，低毒和良好卫生性能则保障安全。 只有这些性能综合达标，才能使PVC长期保持优良外观与使用性能。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 25152,
                              "text": "The most basic indicator for a heat stabilizer is heat stability. It should not decompose or volatilize in the common PVC processing range of 160 to 200 degrees Celsius, and it should continue to protect PVC over a long processing time. After forming, the product also needs good long-term stability so that properties remain after months or years of storage and use."
                        },
                        {
                              "start": 25152,
                              "end": 55392,
                              "text": "An ideal heat stabilizer should cause little initial coloration and keep PVC light-colored or transparent. It should also suppress later continuous coloration and reduce yellowing during long-term use. The stabilizer itself should not greatly increase melt viscosity or interfere with extrusion, calendering, or other operations. It should be compatible with PVC and avoid exudation, blooming, and surface roughness."
                        },
                        {
                              "start": 55392,
                              "end": 83520,
                              "text": "For products such as wires and cables, it should have minimal influence on insulation resistance, dielectric strength, and dielectric constant. Low volatility, low extractability, and low migration reduce environmental impact. Low toxicity and good sanitary performance ensure safety. Only when these properties are balanced can PVC maintain good appearance and service performance for a long time."
                        }
                  ]
            },
            "duration": {
                  "zh": 64.247,
                  "en": 83.52
            },
            "alt": "第19张：4.3 热稳定剂的性能"
      },
      {
            "id": "slide020",
            "index": 20,
            "number": "4.4",
            "title": "4.4 热稳定剂各论",
            "titleEn": "4.4 Main Types of Heat Stabilizers",
            "image": "player_assets/slide020.webp",
            "audio": {
                  "zh": "player_assets/slide020_zh.mp3",
                  "en": "player_assets/slide020_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide020_zh.vtt",
                  "en": "player_assets/slide020_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 22415,
                              "text": "热稳定剂种类很多，实际常通过复配实现协同。 铅盐类使用早、稳定性和润滑性好、价格低，但毒性和环境污染问题突出，正逐步被替代。 钙锌皂类以脂肪酸钙、锌盐为主，无毒环保、透明性好，但热稳定性往往需要其他稳定剂协同提高。"
                        },
                        {
                              "start": 22415,
                              "end": 52535,
                              "text": "有机锡类具有优异的取代氯和捕获HCl能力，热稳定性高、初期着色小、透明性好，但价格较高，也需关注环境影响。 复合铅盐通过加入辅助稳定剂改善透明、润滑或热稳定性能。 有机膦类可捕获游离HCl并抑制自催化，通常作为配合组分使用。 有机稀土类高效、透明、无毒且耐候性好，但成本较高；"
                        },
                        {
                              "start": 52535,
                              "end": 64390,
                              "text": "双金属皂通过两种金属盐协同捕获HCl； 现代趋势则是无毒环保、高效复配、多功能化和绿色可持续。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 23784,
                              "text": "There are many types of heat stabilizers, and compound systems are often used in practice. Lead salts were used early. They have good stability, lubrication, and low cost, but their toxicity and environmental pollution are serious, so they are being gradually replaced. Calcium-zinc soaps are based on calcium and zinc salts of fatty acids."
                        },
                        {
                              "start": 23784,
                              "end": 48768,
                              "text": "They are non-toxic, environmentally friendly, and transparent, but their heat stability often needs support from other stabilizers. Organotin stabilizers have excellent ability to replace chlorine and capture HCl. They offer high heat stability, low initial coloration, and good transparency, but they are more expensive and environmental impact should be considered."
                        },
                        {
                              "start": 48768,
                              "end": 78696,
                              "text": "Composite lead salts add auxiliary stabilizers to improve transparency, lubrication, or heat stability. Organic phosphorus compounds can capture free HCl and suppress autocatalysis, and are usually used as components in blends. Organic rare-earth stabilizers are efficient, transparent, non-toxic, and weather resistant, but cost is high. Bimetallic soaps use two metal salts to capture HCl synergistically."
                        },
                        {
                              "start": 78696,
                              "end": 88415,
                              "text": "Modern trends focus on non-toxic environmental protection, efficient compounding, multifunctionality, and green sustainability."
                        }
                  ]
            },
            "duration": {
                  "zh": 64.39,
                  "en": 88.415
            },
            "alt": "第20张：4.4 热稳定剂各论"
      },
      {
            "id": "slide021",
            "index": 21,
            "number": "4.5",
            "title": "4.5 热稳定剂的发展方向",
            "titleEn": "4.5 Development Directions of Heat Stabilizers",
            "image": "player_assets/slide021.webp",
            "audio": {
                  "zh": "player_assets/slide021_zh.mp3",
                  "en": "player_assets/slide021_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide021_zh.vtt",
                  "en": "player_assets/slide021_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 23544,
                              "text": "未来热稳定剂的发展目标可以概括为高效、环保和多功能。 高效化意味着在更低添加量下获得更好的热稳定效果，降低成本并减少对材料其他性能的影响。 环保化则要求减少铅、镉等重金属，发展低毒、无毒、可生物降解并符合环保法规的新体系。"
                        },
                        {
                              "start": 23544,
                              "end": 53832,
                              "text": "多功能化强调一剂多效，在热稳定之外兼具润滑、抗冲击和耐候等作用。 复合化通过有机锡、钙锌、稀土和有机磷等组分协同，提高整体效果。 面向高温、高剪切和长寿命制品，还要开发耐候、耐迁移和长期稳定性更好的高性能品种。 新型材料体系包括纳米材料、无机纳米粒子和功能化聚合物。"
                        },
                        {
                              "start": 53832,
                              "end": 67511,
                              "text": "智能化应用则依据树脂、工艺和用途进行精准匹配，实现按需定制。 最终还要走向可回收、可降解和循环经济，为PVC产业提供更可靠、更绿色的保障。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 28824,
                              "text": "Future heat stabilizers can be summarized by three goals: high efficiency, environmental friendliness, and multifunctionality. High efficiency means obtaining better heat stability at lower dosage, reducing cost and minimizing effects on other material properties. Environmental friendliness means reducing heavy metals such as lead and cadmium, and developing low-toxic, non-toxic, biodegradable, and regulation-compliant new systems."
                        },
                        {
                              "start": 28824,
                              "end": 52344,
                              "text": "Multifunctionality means one additive can provide several effects, such as heat stabilization, lubrication, impact modification, and weather resistance. Compounding organotin, calcium-zinc, rare-earth, organic phosphorus, and other components can create synergy and improve overall performance."
                        },
                        {
                              "start": 52344,
                              "end": 78504,
                              "text": "For products exposed to high temperature, high shear, or long service life, high-performance stabilizers with better weatherability, migration resistance, and long-term stability are needed. New material systems include nanomaterials, inorganic nanoparticles, and functional polymers. Intelligent application means matching stabilizers precisely with resin, process, and product use."
                        },
                        {
                              "start": 78504,
                              "end": 89927,
                              "text": "In the end, heat stabilizers must also support recyclability, degradability, and circular economy, providing more reliable and greener support for the PVC industry."
                        }
                  ]
            },
            "duration": {
                  "zh": 67.511,
                  "en": 89.927
            },
            "alt": "第21张：4.5 热稳定剂的发展方向"
      },
      {
            "id": "slide022",
            "index": 22,
            "number": "5.1",
            "title": "5.1 光稳定剂概述",
            "titleEn": "5.1 Overview of Light Stabilizers",
            "image": "player_assets/slide022.webp",
            "audio": {
                  "zh": "player_assets/slide022_zh.mp3",
                  "en": "player_assets/slide022_en.mp3"
            },
            "subtitle": {
                  "zh": "player_assets/slide022_zh.vtt",
                  "en": "player_assets/slide022_en.vtt"
            },
            "cues": {
                  "zh": [
                        {
                              "start": 0,
                              "end": 23135,
                              "text": "光稳定剂是一类能够延缓或抑制聚合物在光照条件下发生光老化的助剂。 聚合物受到阳光尤其是紫外线照射后，会发生一系列降解反应，最终表现为变色、开裂、粉化和脆化。 光稳定剂通过吸收、屏蔽或消耗有害光能，阻断或减缓这些反应。"
                        },
                        {
                              "start": 23135,
                              "end": 49415,
                              "text": "它的作用包括吸收紫外线并转化为无害能量、淬灭激发态、清除自由基和终止光氧化链反应。 光稳定剂广泛用于塑料、橡胶、涂料和合成纤维。 按机理，常见类型有紫外线吸收剂和受阻胺光稳定剂HALS，前者吸收紫外线，后者捕捉自由基，并具有一定再生能力。"
                        },
                        {
                              "start": 49415,
                              "end": 64174,
                              "text": "理想光稳定剂应高效、耐热耐迁移、与聚合物相容、低挥发低毒，并尽量不影响颜色和性能。 现代研究正向高效、低毒、复配协同和环保长效发展。"
                        }
                  ],
                  "en": [
                        {
                              "start": 0,
                              "end": 30960,
                              "text": "Light stabilizers are additives that delay or inhibit photo-aging of polymers under light exposure. When polymers are exposed to sunlight, especially ultraviolet radiation, they undergo a series of degradation reactions. The final results include discoloration, cracking, powdering, and embrittlement. Light stabilizers protect materials by absorbing, shielding, or consuming harmful light energy, and by blocking or slowing these reactions."
                        },
                        {
                              "start": 30960,
                              "end": 57264,
